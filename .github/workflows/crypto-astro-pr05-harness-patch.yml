name: Crypto-Astro PR-05 Harness Patch

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/crypto-astro-editorial-composition-cta-v0-1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: feature/crypto-astro-editorial-composition-cta-v0-1

      - name: Update versioned surface truth selectors
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('tools/crypto_astro_surface_truth/surface_truth.py')
          text = path.read_text(encoding='utf-8')
          old = '''SCHEMA_VERSION = "crypto_astro_surface_truth_report_v0_1"
          REQUIRED_SELECTORS = (
              "body",
              ".surface-hub",
              ".hero",
              "#btc-phi-cycle-hub",
              ".market-reality-grid",
              ".alt-rotation-module",
              ".cosmographer-watch-v0-2",
          )
          STYLE_SELECTORS = (
              ".surface-hub",
              ".hero",
              "#btc-phi-cycle-hub",
              ".btc-quiet-phi-core-v0-3",
              ".btc-entry-v1",
              ".market-reality-grid",
              ".alt-rotation-module",
              ".cosmographer-watch-v0-2",
          )'''.replace('          ', '')
          new = '''SCHEMA_VERSION = "crypto_astro_surface_truth_report_v0_2"
          REQUIRED_SELECTORS = (
              "body",
              ".crypto-astro-primary-nav",
              ".hero",
              "#what-changed",
              "#btc-phi-cycle-hub",
              ".market-reality-grid",
              ".alt-rotation-module",
              "#trust-access",
          )
          STYLE_SELECTORS = (
              ".crypto-astro-primary-nav",
              ".hero",
              "#what-changed",
              "#btc-phi-cycle-hub",
              ".btc-quiet-phi-core-v0-3",
              ".btc-entry-v1",
              ".market-reality-grid",
              ".alt-rotation-module",
              "#trust-access",
          )'''.replace('          ', '')
          assert old in text, 'surface truth selector block not found'
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Run harness fixtures
        run: python3 -m unittest discover -s tools/crypto_astro_surface_truth -p "test_*.py" -v

      - name: Remove worker and commit
        run: |
          rm .github/workflows/crypto-astro-pr05-harness-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/crypto_astro_surface_truth/surface_truth.py .github/workflows/crypto-astro-pr05-harness-patch.yml
          git commit -m "Version surface-truth selectors for editorial composition"
          git push origin HEAD:feature/crypto-astro-editorial-composition-cta-v0-1
