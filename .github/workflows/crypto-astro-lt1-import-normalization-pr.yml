name: Crypto-Astro LT-1 Import Normalization PR

on:
  pull_request:
    paths:
      - "site/crypto-astro/index.html"
      - "site/theme/phi_theme.css"
      - "site/theme/system.css"
      - "site/theme/crypto_astro_surface.css"
      - "tools/crypto_astro_local_truth/**"
      - "tools/crypto_astro_surface_truth/**"
      - ".github/workflows/crypto-astro-lt1-import-normalization-pr.yml"

permissions:
  contents: read

jobs:
  lt1-import-normalization:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enforce bounded path scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess

          allowed_exact = {
              ".github/workflows/crypto-astro-lt1-import-normalization-pr.yml",
              "site/crypto-astro/index.html",
          }
          allowed_prefixes = ("tools/crypto_astro_local_truth/",)
          changed = subprocess.check_output(
              ["git", "diff", "--name-only", os.environ["BASE_SHA"], os.environ["HEAD_SHA"]],
              text=True,
          ).splitlines()
          unexpected = [
              path for path in changed
              if path not in allowed_exact and not path.startswith(allowed_prefixes)
          ]
          assert not unexpected, f"Unexpected LT-1/import-normalization paths: {unexpected}"
          assert "site/crypto-astro/index.html" in changed
          print("LT1_IMPORT_NORMALIZATION_PATH_SCOPE=PASS")
          PY

      - name: Install browser dependencies
        run: python3 -m pip install --disable-pip-version-check selenium==4.34.2 pillow==11.3.0

      - name: Run import graph fixtures
        run: |
          python3 -m unittest discover \
            -s tools/crypto_astro_local_truth \
            -p "test_*.py" \
            -v

      - name: Prepare exact base worktree
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: git worktree add --detach /tmp/crypto-astro-lt1-base "$BASE_SHA"

      - name: Verify pre-normalization import graph
        run: |
          mkdir -p artifacts/base
          python3 tools/crypto_astro_local_truth/verify_import_graph.py \
            --root /tmp/crypto-astro-lt1-base \
            --mode before \
            --out artifacts/base/import-graph-report.json

      - name: Run LT-1 against exact merged base
        run: |
          bash tools/crypto_astro_local_truth/run_local_truth.sh \
            /tmp/crypto-astro-lt1-base \
            artifacts/base \
            4173

      - name: Verify normalized head import graph
        run: |
          mkdir -p artifacts/head
          python3 tools/crypto_astro_local_truth/verify_import_graph.py \
            --root "$GITHUB_WORKSPACE" \
            --mode after \
            --out artifacts/head/import-graph-report.json

      - name: Run local truth against normalized head
        run: |
          bash tools/crypto_astro_local_truth/run_local_truth.sh \
            "$GITHUB_WORKSPACE" \
            artifacts/head \
            4174

      - name: Compare base and normalized head truth
        run: |
          python3 tools/crypto_astro_css_extract/compare_surface_truth.py \
            --base artifacts/base \
            --head artifacts/head \
            --out artifacts/lt1-import-normalization-parity-report.json

      - name: Verify import route reduction only
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          base = json.loads(Path("artifacts/base/import-graph-report.json").read_text())
          head = json.loads(Path("artifacts/head/import-graph-report.json").read_text())
          assert base["status"] == "PASS"
          assert head["status"] == "PASS"
          assert base["measurements"]["effective_system_css_routes"] == 2
          assert head["measurements"]["effective_system_css_routes"] == 1
          print("SYSTEM_CSS_EFFECTIVE_ROUTES_BEFORE=2")
          print("SYSTEM_CSS_EFFECTIVE_ROUTES_AFTER=1")
          print("IMPORT_NORMALIZATION=PASS")
          PY

      - name: Upload LT-1 and parity evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-astro-lt1-import-normalization-${{ github.event.pull_request.number }}
          path: artifacts/
          if-no-files-found: error
