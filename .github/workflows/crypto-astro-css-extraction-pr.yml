name: Crypto-Astro CSS Extraction Parity PR

on:
  pull_request:
    paths:
      - "site/crypto-astro/index.html"
      - "site/theme/crypto_astro_inline_legacy.css"
      - "site/theme/crypto_astro_surface.css"
      - "site/theme/crypto_astro/**"
      - "tools/crypto_astro_css_extract/**"
      - "tools/crypto_astro_surface_truth/**"
      - "tools/crypto_astro_ci/**"
      - ".github/workflows/crypto-astro-css-extraction-pr.yml"

permissions:
  contents: read

jobs:
  extraction-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test legacy applicability classifier
        run: python3 -m unittest discover -s tools/crypto_astro_ci -p "test_*.py" -v

      - name: Classify gate applicability
        id: applicability
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          mkdir -p artifacts
          python3 tools/crypto_astro_ci/classify_legacy_applicability.py \
            --workflow css-extraction \
            --head-ref "$HEAD_REF" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --out artifacts/css-extraction-applicability.json

      - name: Record explicit non-applicable pass
        if: ${{ steps.applicability.outputs.mode != 'HISTORICAL_EXACT' }}
        run: |
          echo "CSS_EXTRACTION_PARITY_NOT_APPLICABLE_PASS=${{ steps.applicability.outputs.mode }}"
          echo "The one-time mechanical extraction completed in PR #130; intentional current changes must not be compared to that historical base."

      - name: Install historical browser dependencies
        if: ${{ steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        run: python3 -m pip install --disable-pip-version-check selenium==4.34.2 pillow==11.3.0

      - name: Enforce historical PR-02 path scope
        if: ${{ steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY'
          import os, subprocess
          allowed_exact = {
              "site/crypto-astro/index.html",
              "site/theme/crypto_astro_inline_legacy.css",
              ".github/workflows/crypto-astro-css-extraction-pr.yml",
          }
          allowed_prefix = "tools/crypto_astro_css_extract/"
          changed = subprocess.check_output(
              ["git", "diff", "--name-only", os.environ["BASE_SHA"], os.environ["HEAD_SHA"]], text=True
          ).splitlines()
          unexpected = [p for p in changed if p not in allowed_exact and not p.startswith(allowed_prefix)]
          assert not unexpected, f"Unexpected historical PR-02 paths: {unexpected}"
          assert "site/crypto-astro/index.html" in changed
          assert "site/theme/crypto_astro_inline_legacy.css" in changed
          print("HISTORICAL_PR_02_ALLOWED_PATHS=PASS")
          PY

      - name: Run historical extractor and comparator fixtures
        if: ${{ steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        run: python3 -m unittest discover -s tools/crypto_astro_css_extract -p "test_*.py" -v

      - name: Verify historical exact mechanical extraction
        if: ${{ steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python3 tools/crypto_astro_css_extract/extract_inline_css.py --verify-base-ref "$BASE_SHA"

      - name: Run historical base/head parity
        if: ${{ steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git worktree add --detach /tmp/crypto-astro-pr02-base "$BASE_SHA"
          bash tools/crypto_astro_local_truth/run_local_truth.sh /tmp/crypto-astro-pr02-base artifacts/base 4173
          bash tools/crypto_astro_local_truth/run_local_truth.sh "$GITHUB_WORKSPACE" artifacts/head 4174
          python3 tools/crypto_astro_css_extract/compare_surface_truth.py \
            --base artifacts/base --head artifacts/head --out artifacts/css-extraction-parity-report.json

      - name: Upload CSS extraction applicability evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-astro-css-extraction-parity-${{ github.event.pull_request.number }}
          path: artifacts/
          if-no-files-found: error
