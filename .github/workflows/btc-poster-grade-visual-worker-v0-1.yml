  padding: 1rem 1rem 1rem 5.15rem;
  display: grid;
  align-content: center;
  border: 0;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
  backdrop-filter: none;
}

.btc-deep-v1 .btc-node-v1 span {
  color: rgba(246,201,97,0.92);
  font-size: .7rem;
  letter-spacing: .14em;
}

.btc-deep-v1 .btc-node-v1 strong {
  color: rgba(241,246,255,0.92);
  font-size: .82rem;
  line-height: 1.38;
  text-shadow: 0 0 12px rgba(106,168,255,0.10);
}

.btc-deep-v1 .btc-node-v1::before {
  position: absolute !important;
  left: .55rem !important;
  top: 50% !important;
  width: 3.75rem !important;
  height: 3.75rem !important;
  transform: translateY(-50%) !important;
  float: none !important;
  margin: 0 !important;
  display: grid !important;
  place-items: center !important;
  border: 1px solid rgba(246,201,97,0.5) !important;
  border-radius: 50% !important;
  background:
    radial-gradient(circle, rgba(246,201,97,0.18), rgba(3,7,16,0.96) 65%) !important;
  box-shadow:
    0 0 0 .5rem rgba(246,201,97,0.025),
    0 0 32px rgba(246,201,97,0.18),
    inset 0 0 20px rgba(106,168,255,0.06) !important;
}

.btc-deep-v1 .btc-node-v1.phase::before,
.btc-deep-v1 .btc-node-v1.memory::before {
  border-color: rgba(106,168,255,0.58) !important;
  background: radial-gradient(circle, rgba(106,168,255,0.18), rgba(3,7,16,0.96) 65%) !important;
  box-shadow: 0 0 0 .5rem rgba(106,168,255,0.025), 0 0 32px rgba(106,168,255,0.18), inset 0 0 20px rgba(246,201,97,0.05) !important;
}

.btc-deep-v1 .btc-node-v1.review::before {
  content: "";
  background:
    radial-gradient(circle at 50% 35%, rgba(238,244,255,0.76) 0 11%, transparent 12%),
    radial-gradient(ellipse at 50% 72%, rgba(238,244,255,0.42) 0 24%, transparent 25%),
    radial-gradient(circle, rgba(106,168,255,0.14), rgba(3,7,16,0.96) 66%) !important;
  border-color: rgba(226,233,255,0.42) !important;
}

.btc-deep-v1 .btc-node-v1.aspect {
  left: 50%;
  top: 6%;
  transform: translateX(-50%);
}

.btc-deep-v1 .btc-node-v1.phase {
  left: 6%;
  top: 29%;
}

.btc-deep-v1 .btc-node-v1.memory {
  left: auto;
  right: 6%;
  top: 29%;
}

.btc-deep-v1 .btc-node-v1.confirm {
  left: 12%;
  right: auto;
  top: auto;
  bottom: 9%;
}

.btc-deep-v1 .btc-node-v1.review {
  left: auto;
  right: 12%;
  top: auto;
  bottom: 9%;
  min-width: 14rem;
  border: 0;
}

.btc-deep-v1 .btc-node-v1:hover,
.btc-deep-v1 .btc-node-v1:focus-within {
  filter: brightness(1.12);
}

@media (max-width: 980px) and (min-width: 621px) {
  .btc-deep-v1 .btc-grid-v1 {
    grid-template-columns: 1fr;
  }
  .btc-deep-v1 .btc-field-v1 {
    order: -1;
  }
  .btc-deep-v1 .btc-node-v1 {
    min-width: 10.5rem;
    max-width: 12.5rem;
    padding-left: 4.25rem;
  }
  .btc-deep-v1 .btc-node-v1::before {
    width: 3.1rem !important;
    height: 3.1rem !important;
  }
}

@media (max-width: 620px) {
  .btc-deep-v1 .btc-grid-v1 {
    grid-template-columns: 1fr;
  }
  .btc-deep-v1 .btc-field-v1 {
    min-height: 30rem;
  }
  .btc-deep-v1 .btc-quiet-phi-core-v0-3 {
    width: 9.1rem !important;
  }
  .btc-deep-v1 .btc-entry-v1 {
    min-height: 7rem;
  }
  .btc-deep-v1 .btc-entry-v1::before {
    left: 4.8rem;
    right: 1rem;
    top: 2.25rem;
  }
  .btc-deep-v1 .btc-entry-v1::after {
    left: 4.1rem;
    width: 82%;
    top: 2.25rem;
  }
  .btc-deep-v1 .btc-entry-v1 .btc-field-read-entry-glyph-v0-1 {
    width: 3.25rem;
    height: 3.25rem;
  }
  .btc-deep-v1 .btc-cycle-canvas-v1 {
    min-height: auto;
    background:
      radial-gradient(circle at 18% 20%, rgba(106,168,255,0.10), transparent 34%),
      linear-gradient(180deg, #020611, #08152d);
  }
  .btc-deep-v1 .btc-cycle-route-v1,
  .btc-deep-v1 .btc-cycle-canvas-v1::before,
  .btc-deep-v1 .btc-cycle-canvas-v1::after {
    display: none;
  }
