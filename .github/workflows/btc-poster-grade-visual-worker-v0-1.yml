name: BTC Poster Grade Visual Worker v0.1

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/btc-poster-grade-visual-worker-v0-1.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  implement:
    name: Build poster-grade BTC visual PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Apply bounded visual implementation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="feature/btc-deep-node-poster-grade-visual-v0-1"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin --delete "$BRANCH" >/dev/null 2>&1 || true
          git checkout -b "$BRANCH"

          cat > /tmp/apply_btc_poster_grade.py <<'PY'
          from pathlib import Path

          html_path = Path("site/crypto-astro/index.html")
          css_path = Path("site/theme/btc_poster_grade.css")
          visual_path = Path(".github/workflows/crypto-astro-static-refresh-pr-visual.yml")

          html = html_path.read_text(encoding="utf-8")
          visual = visual_path.read_text(encoding="utf-8")

          link_anchor = '<link href="../theme/phi_theme.css" rel="stylesheet"/>'
          poster_link = '<link href="../theme/btc_poster_grade.css" rel="stylesheet"/>'
          if html.count(link_anchor) != 1:
              raise SystemExit(f"HTML link anchor count != 1: {html.count(link_anchor)}")
          if poster_link not in html:
              html = html.replace(link_anchor, link_anchor + "\n" + poster_link, 1)
          if html.count(poster_link) != 1:
              raise SystemExit(f"Poster stylesheet link count != 1: {html.count(poster_link)}")

          path_anchor = '      - "site/theme/phi_theme.css"\n'
          poster_path = '      - "site/theme/btc_poster_grade.css"\n'
          if visual.count(path_anchor) != 1:
              raise SystemExit(f"Visual workflow path anchor count != 1: {visual.count(path_anchor)}")
          if poster_path not in visual:
              visual = visual.replace(path_anchor, path_anchor + poster_path, 1)
          if visual.count(poster_path) != 1:
              raise SystemExit(f"Poster path trigger count != 1: {visual.count(poster_path)}")

          css = r'''/* BTC_DEEP_NODE_POSTER_GRADE_VISUAL_IMPLEMENTATION_v0_1:BEGIN
   Poster-grade attraction translated into live CSS geometry.
   Quantitative meaning remains limited to the existing BTC dominance binding.
   All other light paths are explicitly semantic and navigational. */

.btc-deep-v1 {
  --btc-poster-gold: #f6c961;
  --btc-poster-blue: #6aa8ff;
  --btc-poster-ink: #020611;
  isolation: isolate;
  border-color: rgba(246, 201, 97, 0.34);
  background:
    radial-gradient(circle at 78% 16%, rgba(80, 139, 235, 0.15), transparent 33%),
    radial-gradient(circle at 24% 8%, rgba(246, 201, 97, 0.11), transparent 28%),
    linear-gradient(155deg, #02050d 0%, #071126 54%, #02050c 100%);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.025),
    inset 0 0 130px rgba(44, 91, 171, 0.07),
    0 34px 90px rgba(0,0,0,0.42);
}

.btc-deep-v1::before {
  opacity: 0.28;
  background:
    linear-gradient(rgba(106,168,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(106,168,255,0.028) 1px, transparent 1px),
    radial-gradient(circle at 50% 34%, rgba(246,201,97,0.08), transparent 34%);
  background-size: 52px 52px, 52px 52px, 100% 100%;
}

.btc-deep-v1::after {
  content: "";
  position: absolute;
  z-index: 0;
  inset: 0;
  pointer-events: none;
  opacity: 0.72;
  background-image:
    radial-gradient(circle at 7% 13%, rgba(246,201,97,.72) 0 1px, transparent 1.8px),
    radial-gradient(circle at 18% 72%, rgba(106,168,255,.65) 0 1px, transparent 1.8px),
    radial-gradient(circle at 33% 24%, rgba(255,255,255,.62) 0 1px, transparent 1.7px),
    radial-gradient(circle at 52% 8%, rgba(246,201,97,.55) 0 1px, transparent 1.7px),
    radial-gradient(circle at 67% 83%, rgba(106,168,255,.55) 0 1px, transparent 1.7px),
    radial-gradient(circle at 88% 31%, rgba(246,201,97,.7) 0 1px, transparent 1.8px),
    radial-gradient(circle at 94% 74%, rgba(255,255,255,.52) 0 1px, transparent 1.7px);
  background-size: 19rem 17rem, 23rem 21rem, 29rem 27rem, 31rem 25rem, 37rem 33rem, 41rem 37rem, 47rem 43rem;
  animation: btcPosterStars 30s ease-in-out infinite;
}

.btc-deep-v1 > * {
  position: relative;
  z-index: 1;
}

.btc-deep-v1 .btc-head-v1 h2 {
  max-width: 72rem;
  font-size: clamp(2.75rem, 5vw, 4.45rem);
  letter-spacing: -0.052em;
  text-shadow: 0 0 34px rgba(106,168,255,0.08);
}

.btc-deep-v1 .btc-grid-v1 {
  grid-template-columns: minmax(15rem, .54fr) minmax(34rem, 1.46fr);
  gap: 1.15rem;
}

.btc-deep-v1 .btc-meta-v1 {
  padding: 1.2rem 0 1.2rem .2rem;
}

.btc-deep-v1 .btc-metrics-v1 > div {
  border-color: rgba(246,201,97,0.28);
  background:
    radial-gradient(circle at 10% 10%, rgba(246,201,97,0.11), transparent 36%),
    linear-gradient(145deg, rgba(7,13,28,0.92), rgba(3,7,16,0.78));
  box-shadow: inset 0 0 28px rgba(106,168,255,0.035), 0 18px 46px rgba(0,0,0,0.24);
}

.btc-deep-v1 .btc-field-v1 {
  min-height: 38rem;
  border-color: rgba(246,201,97,0.36);
  background:
    radial-gradient(circle at 50% 50%, rgba(246,201,97,0.22) 0 3%, transparent 18%),
    radial-gradient(circle at 50% 50%, transparent 0 30%, rgba(72,124,220,0.12) 30.2% 30.7%, transparent 31% 43%, rgba(246,201,97,0.09) 43.2% 43.6%, transparent 44%),
    repeating-radial-gradient(circle at 50% 50%, transparent 0 3.15rem, rgba(106,168,255,0.055) 3.18rem 3.22rem, transparent 3.25rem 5.4rem),
    linear-gradient(145deg, #020611 0%, #0a1730 54%, #020611 100%);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.025),
    inset 0 0 110px rgba(42,85,166,0.08),
    0 28px 76px rgba(0,0,0,0.38);
}

.btc-deep-v1 .btc-field-v1::before {
  width: min(34rem, 86%);
  aspect-ratio: 1;
  border: 1px solid rgba(246,201,97,0.23);
  background:
    repeating-conic-gradient(from 0deg, rgba(246,201,97,0.22) 0 0.45deg, transparent 0.55deg 9deg),
    radial-gradient(circle, transparent 0 54%, rgba(106,168,255,0.08) 54.5% 55%, transparent 55.5%);
  -webkit-mask: radial-gradient(circle, transparent 0 48%, #000 49% 50%, transparent 51% 66%, #000 67% 68%, transparent 69%);
  mask: radial-gradient(circle, transparent 0 48%, #000 49% 50%, transparent 51% 66%, #000 67% 68%, transparent 69%);
  box-shadow:
    0 0 0 4.9rem rgba(65,116,210,0.018),
    0 0 0 4.95rem rgba(65,116,210,0.11),
    0 0 88px rgba(106,168,255,0.09);
  animation: btcPosterOrbit 38s linear infinite;
}

.btc-deep-v1 .btc-field-v1::after {
  width: min(26rem, 68%);
  aspect-ratio: 1;
  border: 1px solid rgba(106,168,255,0.22);
  background:
    linear-gradient(90deg, transparent 49.7%, rgba(246,201,97,0.24) 49.9% 50.1%, transparent 50.3%),
    linear-gradient(transparent 49.7%, rgba(106,168,255,0.18) 49.9% 50.1%, transparent 50.3%);
  box-shadow: 0 0 0 3.7rem rgba(106,168,255,0.025), 0 0 0 3.75rem rgba(106,168,255,0.09);
  opacity: 0.9;
}

.btc-deep-v1 .btc-quiet-phi-core-v0-3 {
  width: clamp(10.2rem, 18vw, 12.7rem);
  border: 1px solid rgba(255,239,190,0.88);
  background:
    radial-gradient(circle at 34% 26%, rgba(255,255,255,0.98) 0 2%, transparent 17%),
    radial-gradient(circle at 50% 50%, #fff2bd 0 18%, #f7d778 51%, #d3d3c9 100%);
  box-shadow:
    0 0 16px rgba(255,238,184,0.9),
    0 0 54px rgba(246,201,97,0.64),
    0 0 135px rgba(246,201,97,0.25),
    0 0 210px rgba(106,168,255,0.09);
}

.btc-deep-v1 .btc-quiet-phi-core-v0-3::before {
  inset: -1.45rem;
  -webkit-mask: radial-gradient(circle, transparent 0 69%, #000 70% 78%, transparent 79%);
  mask: radial-gradient(circle, transparent 0 69%, #000 70% 78%, transparent 79%);
  filter: drop-shadow(0 0 7px rgba(246,201,97,0.55));
}

.btc-deep-v1 .btc-quiet-phi-core-v0-3::after {
  content: "";
  position: absolute;
  inset: 11%;
  border-radius: 50%;
  opacity: 0.48;
  background:
    repeating-conic-gradient(from 0deg, rgba(73,96,135,0.27) 0 0.65deg, transparent 0.75deg 12deg),
    repeating-radial-gradient(circle, transparent 0 0.72rem, rgba(255,255,255,0.13) 0.75rem 0.78rem, transparent 0.81rem 1.35rem);
  -webkit-mask: radial-gradient(circle, transparent 0 19%, #000 20% 72%, transparent 73%);
  mask: radial-gradient(circle, transparent 0 19%, #000 20% 72%, transparent 73%);
  animation: btcPosterCoreLattice 26s linear infinite;
}

.btc-deep-v1 .btc-quiet-phi-core-v0-3 span {
  font-size: 1.7rem;
  letter-spacing: .1em;
}

.btc-deep-v1 .btc-quiet-phi-core-v0-3 strong {
  font-size: 1.5rem;
}

.btc-deep-v1 .btc-t-v1 {
  width: 38%;
  height: 25%;
  color: rgba(239,245,255,0.92);
  font-size: .76rem;
  text-shadow: 0 0 12px rgba(106,168,255,0.16);
}

.btc-deep-v1 .btc-t-v1 span {
  display: inline-flex;
  align-items: center;
  gap: .46rem;
  padding: .22rem .45rem;
  border-radius: 999px;
  background: rgba(2,6,17,0.58);
  box-shadow: 0 0 22px rgba(0,0,0,0.22);
}

.btc-deep-v1 .btc-t-v1 span::before {
  content: "";
  width: .52rem;
  height: .52rem;
  flex: 0 0 auto;
  border: 1px solid rgba(246,201,97,0.68);
  border-radius: 50%;
  background: radial-gradient(circle, #f8d371 0 24%, transparent 29%);
  box-shadow: 0 0 12px rgba(246,201,97,0.42);
}

.btc-deep-v1 .btc-t-v1.liquid span::before,
.btc-deep-v1 .btc-t-v1.reviewed span::before {
  border-color: rgba(106,168,255,0.72);
  background: radial-gradient(circle, #86b7ff 0 24%, transparent 29%);
