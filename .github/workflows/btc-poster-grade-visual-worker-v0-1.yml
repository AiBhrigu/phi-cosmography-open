name: BTC Poster Grade Visual Worker v0.1

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/btc-poster-grade-visual-worker-v0-1.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: btc-poster-grade-visual-worker-v0-1
  cancel-in-progress: false

jobs:
  implement:
    name: Build poster-grade BTC visual PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main with parent payload
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Recover anchored payload and open implementation PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="feature/btc-deep-node-poster-grade-visual-v0-1"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin --delete "$BRANCH" >/dev/null 2>&1 || true
          git checkout -b "$BRANCH"

          python3 - <<'PY'
          from pathlib import Path
          import subprocess
          import textwrap

          worker_path = ".github/workflows/btc-poster-grade-visual-worker-v0-1.yml"
          old = subprocess.check_output(
              ["git", "show", f"HEAD^:{worker_path}"],
              text=True,
          )
          start_marker = "          css = r'''"
          end_marker = "\n          '''\n"
          if old.count(start_marker) != 1:
              raise SystemExit(f"anchored CSS start count != 1: {old.count(start_marker)}")
          start = old.index(start_marker) + len(start_marker)
          end = old.index(end_marker, start)
          css = textwrap.dedent(old[start:end]).strip() + "\n"

          if "BTC_DEEP_NODE_POSTER_GRADE_VISUAL_IMPLEMENTATION_v0_1" not in css:
              raise SystemExit("poster-grade marker missing from anchored payload")
          if "Φ" in css:
              raise SystemExit("poster-grade CSS introduces a literal Phi")

          html_path = Path("site/crypto-astro/index.html")
          css_path = Path("site/theme/btc_poster_grade.css")
          visual_path = Path(".github/workflows/crypto-astro-static-refresh-pr-visual.yml")
          html = html_path.read_text(encoding="utf-8")
          visual = visual_path.read_text(encoding="utf-8")

          link_anchor = '<link href="../theme/phi_theme.css" rel="stylesheet"/>'
          poster_link = '<link href="../theme/btc_poster_grade.css" rel="stylesheet"/>'
          if html.count(link_anchor) != 1:
              raise SystemExit(f"HTML link anchor count != 1: {html.count(link_anchor)}")
          if poster_link not in html:
              html = html.replace(link_anchor, link_anchor + "\n" + poster_link, 1)
          if html.count(poster_link) != 1:
              raise SystemExit(f"Poster stylesheet link count != 1: {html.count(poster_link)}")

          path_anchor = '      - "site/theme/phi_theme.css"\n'
          poster_path = '      - "site/theme/btc_poster_grade.css"\n'
          if visual.count(path_anchor) != 1:
              raise SystemExit(f"Visual path anchor count != 1: {visual.count(path_anchor)}")
          if poster_path not in visual:
              visual = visual.replace(path_anchor, path_anchor + poster_path, 1)
          if visual.count(poster_path) != 1:
              raise SystemExit(f"Poster visual trigger count != 1: {visual.count(poster_path)}")

          if html.count("https://www.bhrigu.io/crypto-astro/btc") != 1:
              raise SystemExit("BTC Field Read route count drift")

          html_path.write_text(html, encoding="utf-8")
          css_path.write_text(css, encoding="utf-8")
          visual_path.write_text(visual, encoding="utf-8")
          print("POSTER_GRADE_PAYLOAD_RECOVERY=PASS")
          PY

          python3 tools/crypto_astro_static_refresh/test_defi_tvl_methodology_v0_1.py
          rm .github/workflows/btc-poster-grade-visual-worker-v0-1.yml

          git add site/crypto-astro/index.html site/theme/btc_poster_grade.css .github/workflows/crypto-astro-static-refresh-pr-visual.yml .github/workflows/btc-poster-grade-visual-worker-v0-1.yml
          git commit -m "Implement BTC poster-grade visual surface v0.1"
          git push --set-upstream origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Crypto-Astro: implement BTC poster-grade visual surface" \
            --body $'Poster-grade visual implementation for the already verified BTC deep node.\n\nScope:\n- stronger data-bound BTC gravitational field without new measured claims\n- luminous Enter BTC Field Read corridor\n- five public-safe Aspect-Cycle nodes around a non-literal relational nucleus\n- single-Phi rule preserved: the new stylesheet contains no literal Phi\n- reduced-motion supported\n- one-time worker removed from the implementation branch\n\nBoundary:\n- no data, snapshot, proof, refresh runner, route, A/E, C/T, backend, API, payment, forecast, trading signal, or ORION-core change\n- no Semenko, pairs, orbs, weights, ranked hits, or private method taxonomy reintroduced'
