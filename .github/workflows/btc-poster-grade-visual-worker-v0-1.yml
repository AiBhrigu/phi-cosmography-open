}

.btc-deep-v1 .btc-t-v1::after {
  border-top-color: rgba(246,201,97,0.46);
  box-shadow: 0 -1px 9px rgba(246,201,97,0.08);
}

.btc-deep-v1 .btc-t-v1.liquid::after,
.btc-deep-v1 .btc-t-v1.reviewed::after {
  border-top-color: rgba(106,168,255,0.46);
  box-shadow: 0 -1px 9px rgba(106,168,255,0.08);
}

.btc-deep-v1 .btc-entry-v1 {
  min-height: 7.15rem;
  padding: 1rem 1.35rem;
  border-color: rgba(246,201,97,0.66);
  border-radius: 32px;
  background:
    radial-gradient(circle at 7% 50%, rgba(246,201,97,0.25), transparent 18%),
    radial-gradient(ellipse at 62% 50%, rgba(246,201,97,0.12), transparent 25%),
    linear-gradient(90deg, rgba(246,201,97,0.10), rgba(31,69,133,0.15) 58%, rgba(2,6,17,0.82));
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.035),
    inset 0 0 72px rgba(106,168,255,0.045),
    0 25px 70px rgba(0,0,0,0.38),
    0 0 42px rgba(246,201,97,0.08);
}

.btc-deep-v1 .btc-entry-v1::before {
  left: 6.9rem;
  right: 6.6rem;
  height: 3px;
  background: linear-gradient(90deg, rgba(255,223,132,0.98), rgba(246,201,97,0.42) 22%, rgba(106,168,255,0.58) 70%, rgba(246,201,97,0.34));
  box-shadow: 0 0 9px rgba(246,201,97,0.84), 0 0 28px rgba(106,168,255,0.26);
}

.btc-deep-v1 .btc-entry-v1::after {
  left: 6rem;
  width: min(58rem, 76%);
  height: 6.5rem;
  opacity: .86;
  background:
    repeating-radial-gradient(ellipse at left center, transparent 0 1.2rem, rgba(246,201,97,0.13) 1.25rem 1.31rem, transparent 1.36rem 2.25rem),
    conic-gradient(from 270deg at 78% 50%, transparent 0 42%, rgba(246,201,97,0.11) 46% 54%, transparent 58%),
    radial-gradient(ellipse at left center, rgba(246,201,97,0.23), transparent 68%);
  filter: drop-shadow(0 0 8px rgba(246,201,97,0.18));
  animation: btcPosterTunnel 9s ease-in-out infinite;
}

.btc-deep-v1 .btc-entry-v1 .btc-field-read-entry-glyph-v0-1 {
  width: 4.45rem;
  height: 4.45rem;
  border-color: rgba(246,201,97,0.82);
  box-shadow:
    0 0 0 .55rem rgba(246,201,97,0.035),
    0 0 36px rgba(246,201,97,0.42),
    inset 0 0 24px rgba(106,168,255,0.09);
}

.btc-deep-v1 .btc-entry-v1 strong {
  font-size: clamp(.92rem, 1.35vw, 1.15rem);
  letter-spacing: .17em;
  text-shadow: 0 0 18px rgba(246,201,97,0.28);
}

.btc-deep-v1 .btc-entry-v1 em {
  color: rgba(238,244,255,0.86);
  font-size: .88rem;
}

.btc-deep-v1 .btc-entry-arrow-v1 {
  width: 2.8rem;
  height: 2.8rem;
  border-color: rgba(246,201,97,0.42);
  box-shadow: 0 0 24px rgba(246,201,97,0.18);
}

.btc-deep-v1 .btc-market-link-v1 {
  opacity: .62;
}

.btc-deep-v1 .btc-cycle-v1 {
  margin-top: 2.8rem;
  padding-top: 2rem;
}

.btc-deep-v1 .btc-cycle-head-v1 h3 {
  font-size: clamp(2rem, 4vw, 3.15rem);
  text-shadow: 0 0 32px rgba(106,168,255,0.10);
}

.btc-deep-v1 .btc-cycle-canvas-v1 {
  min-height: 43rem;
  border-color: rgba(106,168,255,0.32);
  background:
    radial-gradient(circle at 50% 52%, rgba(246,201,97,0.19) 0 1.8%, transparent 10%),
    radial-gradient(circle at 50% 52%, transparent 0 21%, rgba(106,168,255,0.12) 21.2% 21.7%, transparent 22% 35%, rgba(246,201,97,0.09) 35.2% 35.6%, transparent 36%),
    radial-gradient(circle at 12% 20%, rgba(85,139,235,0.10), transparent 28%),
    radial-gradient(circle at 86% 75%, rgba(246,201,97,0.07), transparent 31%),
    repeating-radial-gradient(circle at 50% 52%, transparent 0 4.6rem, rgba(106,168,255,0.045) 4.65rem 4.7rem, transparent 4.75rem 7.8rem),
    linear-gradient(145deg, #020611 0%, #09152e 55%, #020611 100%);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.025),
    inset 0 0 115px rgba(46,91,177,0.075),
    0 30px 78px rgba(0,0,0,0.36);
}

.btc-deep-v1 .btc-cycle-canvas-v1::before {
  width: 9.4rem;
  border-color: rgba(246,201,97,0.42);
  background:
    radial-gradient(circle, rgba(255,227,143,0.32) 0 7%, transparent 25%),
    repeating-conic-gradient(from 18deg, rgba(246,201,97,0.38) 0 1.2deg, transparent 1.4deg 20deg),
    radial-gradient(circle, transparent 0 48%, rgba(106,168,255,0.16) 49% 50%, transparent 51%);
  box-shadow:
    0 0 0 2.8rem rgba(106,168,255,0.02),
    0 0 0 2.85rem rgba(106,168,255,0.11),
    0 0 58px rgba(246,201,97,0.24),
    0 0 110px rgba(106,168,255,0.10);
  animation: btcPosterNucleus 22s ease-in-out infinite;
}

.btc-deep-v1 .btc-cycle-canvas-v1::after {
  width: min(34rem, 56%);
  height: min(20rem, 42%);
  border-color: rgba(106,168,255,0.28);
  box-shadow:
    0 0 0 3.1rem rgba(246,201,97,0.015),
    0 0 0 3.15rem rgba(246,201,97,0.075),
    0 0 78px rgba(106,168,255,0.08);
  opacity: .9;
  animation: btcPosterRelationalOrbit 34s linear infinite;
}

.btc-deep-v1 .btc-cycle-route-v1 path {
  stroke: rgba(246,201,97,0.62);
  stroke-width: 1.65;
  stroke-dasharray: 11 12;
  filter: drop-shadow(0 0 6px rgba(246,201,97,0.30));
}

.btc-deep-v1 .btc-cycle-route-v1 .s {
  stroke: rgba(106,168,255,0.58);
  stroke-width: 1.4;
  stroke-dasharray: 2 12;
  filter: drop-shadow(0 0 6px rgba(106,168,255,0.25));
}

.btc-deep-v1 .btc-node-v1 {
