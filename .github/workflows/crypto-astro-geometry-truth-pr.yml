name: Crypto-Astro Geometry Truth PR

on:
  pull_request:
    paths:
      - "site/crypto-astro/index.html"
      - "site/theme/crypto_astro_surface.css"
      - "site/theme/crypto_astro/**"
      - "tools/crypto_astro_css_modules/**"
      - "tools/crypto_astro_geometry_truth/**"
      - "tools/crypto_astro_ci/**"
      - ".github/workflows/crypto-astro-geometry-truth-pr.yml"

permissions:
  contents: read

jobs:
  geometry-truth:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test legacy applicability classifier
        run: python3 -m unittest discover -s tools/crypto_astro_ci -p "test_*.py" -v

      - name: Classify gate applicability
        id: applicability
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          mkdir -p artifacts
          python3 tools/crypto_astro_ci/classify_legacy_applicability.py \
            --workflow geometry-truth \
            --head-ref "$HEAD_REF" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --out artifacts/geometry-applicability.json

      - name: Record explicit non-applicable pass
        if: ${{ steps.applicability.outputs.mode == 'GENERATED_REFRESH' || steps.applicability.outputs.mode == 'NON_APPLICABLE' }}
        run: |
          echo "GEOMETRY_TRUTH_NOT_APPLICABLE_PASS=${{ steps.applicability.outputs.mode }}"
          echo "Current refresh, Snapshot Memory, Surface Truth, Static Refresh Visual and BHRIGU consumer gates remain mandatory."

      - name: Install browser dependencies
        if: ${{ steps.applicability.outputs.mode == 'CURRENT_SURFACE_CHANGE' || steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        run: python3 -m pip install --disable-pip-version-check selenium==4.34.2 pillow==11.3.0

      - name: Enforce bounded historical PR-04 path scope
        if: ${{ steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY'
          import os, subprocess
          allowed_exact = {
              ".github/workflows/crypto-astro-geometry-truth-pr.yml",
              "site/crypto-astro/index.html",
              "site/theme/crypto_astro/css_order_manifest.json",
              "site/theme/crypto_astro/extensions/09_geometry_truth_repair.css",
              "site/theme/crypto_astro_surface.css",
              "tools/crypto_astro_css_modules/build_css_modules.py",
              "tools/crypto_astro_css_modules/test_build_css_modules.py",
          }
          allowed_prefixes = ("tools/crypto_astro_geometry_truth/",)
          changed = subprocess.check_output(
              ["git", "diff", "--name-only", os.environ["BASE_SHA"], os.environ["HEAD_SHA"]], text=True
          ).splitlines()
          unexpected = [p for p in changed if p not in allowed_exact and not p.startswith(allowed_prefixes)]
          assert not unexpected, f"Unexpected historical PR-04 paths: {unexpected}"
          required = {
              "site/crypto-astro/index.html",
              "site/theme/crypto_astro/css_order_manifest.json",
              "site/theme/crypto_astro/extensions/09_geometry_truth_repair.css",
              "site/theme/crypto_astro_surface.css",
              "tools/crypto_astro_css_modules/build_css_modules.py",
              "tools/crypto_astro_geometry_truth/verify_geometry_truth.py",
          }
          assert required.issubset(changed), f"Missing historical PR-04 paths: {sorted(required - set(changed))}"
          print("HISTORICAL_PR_04_ALLOWED_PATHS=PASS")
          PY

      - name: Run current CSS-module and geometry fixtures
        if: ${{ steps.applicability.outputs.mode == 'CURRENT_SURFACE_CHANGE' || steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        run: |
          python3 -m unittest discover -s tools/crypto_astro_css_modules -p "test_*.py" -v
          python3 -m unittest discover -s tools/crypto_astro_geometry_truth -p "test_*.py" -v

      - name: Verify current extension bundle and geometry contract
        if: ${{ steps.applicability.outputs.mode == 'CURRENT_SURFACE_CHANGE' || steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        run: |
          python3 tools/crypto_astro_css_modules/build_css_modules.py --verify-source-base > artifacts/css-module-build-report.json
          python3 tools/crypto_astro_geometry_truth/verify_geometry_truth.py --out artifacts/geometry-truth-report.json

      - name: Run current local surface truth
        if: ${{ steps.applicability.outputs.mode == 'CURRENT_SURFACE_CHANGE' || steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        run: bash tools/crypto_astro_local_truth/run_local_truth.sh "$GITHUB_WORKSPACE" artifacts/head 4173

      - name: Verify historical PR-04 preserved invariants
        if: ${{ steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git worktree add --detach /tmp/crypto-astro-pr04-base "$BASE_SHA"
          bash tools/crypto_astro_local_truth/run_local_truth.sh /tmp/crypto-astro-pr04-base artifacts/base 4174
          python3 - <<'PY'
          import json, os, subprocess
          from pathlib import Path
          base_html = subprocess.check_output(["git", "show", f"{os.environ['BASE_SHA']}:site/crypto-astro/index.html"], text=True)
          head_html = Path("site/crypto-astro/index.html").read_text(encoding="utf-8")
          begin = "<!-- BTC_PHI_CYCLE_HUB_SURFACE_LIFT_v0_1:BEGIN -->"
          end = "<!-- BTC_PHI_CYCLE_HUB_SURFACE_LIFT_v0_1:END -->"
          section = lambda value: value[value.index(begin):value.index(end) + len(end)]
          assert section(base_html) == section(head_html), "Historical BTC section changed"
          accepted = ["Market Cap $2.287T", "24h Volume $40.71B", "BTC Dominance 56.5%", "Stablecoin Share 13.5%", "Market Field Score 61 out of 100"]
          for value in accepted:
              assert value in head_html, f"Historical accepted value missing: {value}"
          base_report = json.loads(Path("artifacts/base/surface-truth-report.json").read_text())
          head_report = json.loads(Path("artifacts/head/surface-truth-report.json").read_text())
          assert base_report["status"] == "PASS" and head_report["status"] == "PASS"
          print("HISTORICAL_PR_04_INVARIANTS=PASS")
          PY

      - name: Upload geometry applicability evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-astro-geometry-truth-${{ github.event.pull_request.number }}
          path: artifacts/
          if-no-files-found: error
