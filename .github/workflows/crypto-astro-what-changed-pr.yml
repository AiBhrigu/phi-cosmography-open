name: Crypto-Astro What Changed PR

on:
  pull_request:
    paths:
      - '.github/workflows/crypto-astro-what-changed-pr.yml'
      - 'site/crypto-astro/index.html'
      - 'site/theme/crypto_astro_what_changed.css'
      - 'tools/crypto_astro_what_changed/**'
      - 'tools/crypto_astro_snapshot_memory/**'
      - 'site/crypto-astro/data/crypto_astro_snapshot_registry.public.json'
      - 'site/crypto-astro/data/crypto_astro_snapshot_delta.public.json'
      - 'site/crypto-astro/data/crypto_astro_snapshot_registry.public.schema.json'
      - 'site/crypto-astro/data/crypto_astro_snapshot_delta.public.schema.json'

permissions:
  contents: read

jobs:
  what-changed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install validators
        run: python -m pip install --disable-pip-version-check jsonschema==4.26.0 playwright==1.55.0
      - name: Install Chromium
        run: python -m playwright install --with-deps chromium
      - name: Verify Snapshot Memory contract
        run: |
          mkdir -p artifacts
          python tools/crypto_astro_snapshot_memory/verify_snapshot_memory.py --repo . --report artifacts/snapshot-memory.json
      - name: Run deterministic renderer and verification
        run: |
          python -m unittest discover -s tools/crypto_astro_what_changed -p 'test_*.py' -v
          cp site/crypto-astro/index.html /tmp/index-before.html
          python tools/crypto_astro_what_changed/render_what_changed.py --repo .
          cmp /tmp/index-before.html site/crypto-astro/index.html
          python tools/crypto_astro_what_changed/verify_what_changed.py --repo . --report artifacts/what-changed-verification.json
      - name: Desktop and mobile dynamic browser review
        run: |
          python -m http.server 8000 --directory site > artifacts/http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          python - <<'PY'
          import json
          from pathlib import Path
          from playwright.sync_api import sync_playwright
          delta=json.loads(Path('site/crypto-astro/data/crypto_astro_snapshot_delta.public.json').read_text())
          expected_status=delta['comparison_status'].lower().replace('_','-')
          expected_metrics=len(delta['metrics'])
          expected_unavailable=len(delta['unavailable_metrics'])
          out=Path('artifacts')
          with sync_playwright() as p:
            browser=p.chromium.launch()
            for name,width,height in [('desktop',1440,1100),('mobile',390,844)]:
              page=browser.new_page(viewport={'width':width,'height':height})
              errors=[]
              page.on('console',lambda msg: errors.append(msg.text) if msg.type=='error' else None)
              page.goto('http://127.0.0.1:8000/crypto-astro/index.html',wait_until='networkidle')
              section=page.locator('#what-changed'); section.scroll_into_view_if_needed()
              assert section.get_attribute('data-what-changed-status')==expected_status
              assert section.locator('[data-metric]').count()==expected_metrics
              assert section.locator('code').count()==expected_unavailable
              box=section.bounding_box(); assert box
              grid=section.locator('.what-changed-memory-v0-1__grid')
              tracks=grid.evaluate("el => getComputedStyle(el).gridTemplateColumns.trim().split(/\\s+/).filter(Boolean).length")
              assert tracks==1
              assert box['height'] < (1200 if name=='desktop' else 2800)
              assert not page.evaluate('document.documentElement.scrollWidth > document.documentElement.clientWidth')
              assert not errors, errors
              page.screenshot(path=str(out/f'what-changed-{name}.png'),full_page=True)
              (out/f'what-changed-{name}-geometry.json').write_text(json.dumps({'section':box,'metric_count':expected_metrics,'unavailable_count':expected_unavailable,'tracks':tracks},indent=2)+'\n')
            browser.close()
          PY
      - name: Upload What Changed evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-astro-what-changed-${{ github.event.pull_request.number }}
          path: artifacts/
          if-no-files-found: error
