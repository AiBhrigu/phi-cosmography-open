name: Crypto-Astro Operational Cadence PR

on:
  pull_request:
    paths:
      - ".github/workflows/crypto-astro-static-refresh-manual.yml"
      - ".github/workflows/crypto-astro-operational-cadence-pr.yml"
      - ".github/workflows/crypto-astro-snapshot-memory-pr.yml"
      - ".github/workflows/crypto-astro-assistant-dispatch.yml"
      - ".github/workflows/crypto-astro-assistant-dispatch-pr.yml"
      - "docs/crypto-astro-service/CRYPTO_ASTRO_OPERATIONAL_CADENCE_v0_1.md"
      - "docs/crypto-astro-service/crypto_astro_operational_cadence_v0_1.json"
      - "docs/crypto-astro-service/CRYPTO_ASTRO_ASSISTANT_DISPATCH_v0_1.md"
      - "docs/crypto-astro-service/crypto_astro_assistant_dispatch_v0_1.json"
      - "tools/crypto_astro_operations/**"
      - "docs/crypto-astro-service/crypto_astro_operator_review.md"

permissions:
  contents: read

jobs:
  operational-cadence:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enforce bounded cadence, assistant-dispatch, or Snapshot Memory repair scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess

          cadence_allowed = {
              ".github/workflows/crypto-astro-static-refresh-manual.yml",
              ".github/workflows/crypto-astro-operational-cadence-pr.yml",
              ".github/workflows/crypto-astro-snapshot-memory-pr.yml",
              "docs/crypto-astro-service/CRYPTO_ASTRO_OPERATIONAL_CADENCE_v0_1.md",
              "docs/crypto-astro-service/crypto_astro_operational_cadence_v0_1.json",
              "tools/crypto_astro_operations/verify_operational_cadence.py",
              "tools/crypto_astro_operations/test_verify_operational_cadence.py",
              "docs/crypto-astro-service/crypto_astro_operator_review.md",
          }
          assistant_dispatch_scope = {
              ".github/workflows/crypto-astro-assistant-dispatch.yml",
              ".github/workflows/crypto-astro-assistant-dispatch-pr.yml",
              ".github/workflows/crypto-astro-static-refresh-manual.yml",
              ".github/workflows/crypto-astro-operational-cadence-pr.yml",
              ".github/workflows/crypto-astro-snapshot-memory-pr.yml",
              "docs/crypto-astro-service/CRYPTO_ASTRO_ASSISTANT_DISPATCH_v0_1.md",
              "docs/crypto-astro-service/crypto_astro_assistant_dispatch_v0_1.json",
              "tools/crypto_astro_operations/verify_assistant_dispatch.py",
              "tools/crypto_astro_operations/test_verify_assistant_dispatch.py",
          }
          snapshot_memory_repair_scope = {
              ".github/workflows/crypto-astro-assistant-dispatch-pr.yml",
              ".github/workflows/crypto-astro-operational-cadence-pr.yml",
              ".github/workflows/crypto-astro-snapshot-memory-pr.yml",
              "tools/crypto_astro_snapshot_memory/build_snapshot_memory.py",
              "tools/crypto_astro_snapshot_memory/verify_snapshot_memory.py",
              "tools/crypto_astro_snapshot_memory/test_snapshot_memory.py",
              "site/crypto-astro/data/crypto_astro_snapshot_registry.public.schema.json",
              "site/crypto-astro/data/crypto_astro_snapshot_registry.public.json",
          }
          runtime_registry_test_repair_scope = {
              ".github/workflows/crypto-astro-assistant-dispatch-pr.yml",
              ".github/workflows/crypto-astro-operational-cadence-pr.yml",
              ".github/workflows/crypto-astro-snapshot-memory-pr.yml",
              "tools/crypto_astro_snapshot_memory/test_snapshot_memory.py",
          }
          base = subprocess.check_output(
              ["git", "merge-base", os.environ["BASE_SHA"], os.environ["HEAD_SHA"]], text=True
          ).strip()
          changed = set(
              subprocess.check_output(
                  ["git", "diff", "--name-only", base, os.environ["HEAD_SHA"]], text=True
              ).splitlines()
          )
          if changed == assistant_dispatch_scope:
              print("ASSISTANT_DISPATCH_FILE_SCOPE=PASS")
          elif changed == snapshot_memory_repair_scope:
              print("SNAPSHOT_MEMORY_REPAIR_FILE_SCOPE=PASS")
          elif changed == runtime_registry_test_repair_scope:
              print("SNAPSHOT_MEMORY_RUNTIME_REGISTRY_TEST_REPAIR_FILE_SCOPE=PASS")
          else:
              unexpected = sorted(changed - cadence_allowed)
              assert not unexpected, f"Unexpected cadence paths: {unexpected}"
              assert changed, "Cadence gate triggered without a changed cadence file"
              print("OPERATIONAL_CADENCE_FILE_SCOPE=PASS")
          PY

      - name: Run operations verifier fixtures
        run: python3 -m unittest discover -s tools/crypto_astro_operations -p "test_*.py" -v

      - name: Verify locked operational cadence
        run: |
          mkdir -p artifacts
          python3 tools/crypto_astro_operations/verify_operational_cadence.py \
            --repo . \
            --report artifacts/operational-cadence-verification.json

      - name: Verify assistant dispatch when present
        if: ${{ hashFiles('tools/crypto_astro_operations/verify_assistant_dispatch.py') != '' }}
        run: |
          python3 tools/crypto_astro_operations/verify_assistant_dispatch.py verify-repository \
            --repo . \
            --report artifacts/assistant-dispatch-verification.json

      - name: Upload operations evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-astro-operational-cadence-${{ github.event.pull_request.number }}
          path: artifacts/
          if-no-files-found: error
