name: Crypto-Astro Static Refresh Manual

on:
  workflow_dispatch:
    inputs:
      refresh_mode:
        description: Locked operational reason for this bounded refresh
        required: true
        type: choice
        default: DAILY_CADENCE
        options:
          - DAILY_CADENCE
          - PRE_REPORT
          - MATERIAL_MARKET_EVENT
          - REPEATABILITY_PROOF
          - SOURCE_OR_SCHEMA_REPAIR
      operator_ref:
        description: Named operator or authorization reference
        required: true
        type: string
      refresh_reason:
        description: Concise reason recorded in the review PR
        required: true
        type: string
      expected_main_sha:
        description: Optional assistant-dispatch lock for the exact main commit
        required: false
        type: string
        default: ""
      dispatch_request_issue:
        description: Optional owner-authenticated assistant-dispatch issue number
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: crypto-astro-static-refresh-manual
  cancel-in-progress: false

jobs:
  refresh:
    name: Build atomic static refresh and review PR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CRYPTO_ASTRO_REFRESH_BRANCH: automation/crypto-astro-static-refresh-${{ github.run_id }}
      CRYPTO_ASTRO_REFRESH_OUT: /tmp/crypto_astro_static_refresh_output
      CRYPTO_ASTRO_REFRESH_MODE: ${{ inputs.refresh_mode }}
      CRYPTO_ASTRO_OPERATOR_REF: ${{ inputs.operator_ref }}
      CRYPTO_ASTRO_REFRESH_REASON: ${{ inputs.refresh_reason }}
      CRYPTO_ASTRO_EXPECTED_MAIN_SHA: ${{ inputs.expected_main_sha }}
      CRYPTO_ASTRO_DISPATCH_REQUEST_ISSUE: ${{ inputs.dispatch_request_issue }}
      COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
    steps:
      - name: Checkout exact main source
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install offline validators
        run: python -m pip install --disable-pip-version-check jsonschema==4.26.0

      - name: Configure Git identity and lock current main
        id: main_lock
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          LOCAL_SHA=$(git rev-parse HEAD)
          MAIN_SHA=$(git rev-parse origin/main)
          test "$LOCAL_SHA" = "$MAIN_SHA"
          echo "BASE_SHA=$LOCAL_SHA" >> "$GITHUB_ENV"

          if [[ -n "$CRYPTO_ASTRO_EXPECTED_MAIN_SHA" || -n "$CRYPTO_ASTRO_DISPATCH_REQUEST_ISSUE" ]]; then
            if [[ -z "$CRYPTO_ASTRO_EXPECTED_MAIN_SHA" || -z "$CRYPTO_ASTRO_DISPATCH_REQUEST_ISSUE" ]]; then
              echo "EXPECTED_MAIN_SHA_REQUIRED_WITH_DISPATCH_ISSUE"
              exit 1
            fi
            if [[ ! "$CRYPTO_ASTRO_EXPECTED_MAIN_SHA" =~ ^[0-9a-f]{40}$ ]]; then
              echo "EXPECTED_MAIN_SHA_MUST_BE_40_HEX"
              exit 1
            fi
            if [[ ! "$CRYPTO_ASTRO_DISPATCH_REQUEST_ISSUE" =~ ^[0-9]+$ ]]; then
              echo "DISPATCH_REQUEST_ISSUE_MUST_BE_NUMERIC"
              exit 1
            fi
            test "$LOCAL_SHA" = "$CRYPTO_ASTRO_EXPECTED_MAIN_SHA"
          fi

          rm -rf "$CRYPTO_ASTRO_REFRESH_OUT"
          mkdir -p "$CRYPTO_ASTRO_REFRESH_OUT"

      - name: Verify operational cadence and single-flight preflight
        id: preflight
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 -m unittest discover -s tools/crypto_astro_operations -p "test_*.py" -v
          python3 tools/crypto_astro_operations/verify_operational_cadence.py \
            --repo . \
            --report "$CRYPTO_ASTRO_REFRESH_OUT/operational-cadence-static-verification.json"

          OPEN_REFRESH_COUNT=$(gh pr list --state open --base main \
            --json number,title,headRefName \
            --jq '[.[] | select(.title == "Crypto-Astro: automated static market snapshot refresh" or (.headRefName | startswith("automation/crypto-astro-static-refresh-")))] | length')
          test "$OPEN_REFRESH_COUNT" = "0"

          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          policy = json.loads(Path("docs/crypto-astro-service/crypto_astro_operational_cadence_v0_1.json").read_text())
          mode = os.environ["CRYPTO_ASTRO_REFRESH_MODE"].strip()
          operator_ref = os.environ["CRYPTO_ASTRO_OPERATOR_REF"].strip()
          reason = os.environ["CRYPTO_ASTRO_REFRESH_REASON"].strip()
          allowed = policy["allowed_modes"]
          if mode not in allowed:
              raise SystemExit(f"REFRESH_MODE_NOT_ALLOWED:{mode}")
          if not operator_ref:
              raise SystemExit("OPERATOR_REF_REQUIRED")
          if not reason:
              raise SystemExit("REFRESH_REASON_REQUIRED")
          if len(operator_ref) > 160:
              raise SystemExit("OPERATOR_REF_TOO_LONG")
          if len(reason) > 500:
              raise SystemExit("REFRESH_REASON_TOO_LONG")

          snapshot = json.loads(Path("site/crypto-astro/data/crypto_astro_snapshot.public.json").read_text())
          generated = datetime.fromisoformat(snapshot["generated_at_utc"].replace("Z", "+00:00"))
          now = datetime.now(timezone.utc)
          age_hours = (now - generated).total_seconds() / 3600
          if age_hours < 0:
              raise SystemExit("LATEST_ACCEPTED_SNAPSHOT_IS_IN_FUTURE")
          daily_minimum_interval_hours = policy["cadence"]["daily_minimum_interval_hours"]
          if mode == "DAILY_CADENCE" and age_hours < daily_minimum_interval_hours:
              raise SystemExit(
                  f"DAILY_CADENCE_TOO_EARLY:{age_hours:.2f}h<"
                  f"{daily_minimum_interval_hours}h"
              )

          report = {
              "schema_version": "crypto_astro_operational_cadence_preflight_v0_1",
              "status": "PASS",
              "refresh_mode": mode,
              "operator_ref": operator_ref,
              "refresh_reason": reason,
              "base_sha": os.environ["BASE_SHA"],
              "expected_main_sha": os.environ.get("CRYPTO_ASTRO_EXPECTED_MAIN_SHA", ""),
              "dispatch_request_issue": os.environ.get("CRYPTO_ASTRO_DISPATCH_REQUEST_ISSUE", ""),
              "latest_accepted_snapshot_utc": snapshot["generated_at_utc"],
              "snapshot_age_hours": round(age_hours, 4),
              "daily_minimum_interval_hours": daily_minimum_interval_hours,
              "open_refresh_pr_count": 0,
          }
          out = Path(os.environ["CRYPTO_ASTRO_REFRESH_OUT"]) / "operational-cadence-preflight.json"
          out.write_text(json.dumps(report, indent=2, sort_keys=True) + "\n")
          print("OPERATIONAL_CADENCE_PREFLIGHT=PASS")
          PY

      - name: Verify DeFi TVL methodology contract
        id: methodology
        run: python3 tools/crypto_astro_static_refresh/test_defi_tvl_methodology_v0_1.py

      - name: Run BHRIGU-compatible hardened static refresh locally
        id: source_refresh
        run: |
          python3 tools/crypto_astro_static_refresh/crypto_astro_static_refresh_bhrigu_compat_v0_1.py \
            "$GITHUB_WORKSPACE" "$CRYPTO_ASTRO_REFRESH_OUT"

      - name: Materialize cadence metadata in operator review
        id: operator_review
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("docs/crypto-astro-service/crypto_astro_operator_review.md")
          text = path.read_text(encoding="utf-8")
          metadata = (
              f"REFRESH_MODE={os.environ['CRYPTO_ASTRO_REFRESH_MODE']}\n"
              f"OPERATOR_REF={os.environ['CRYPTO_ASTRO_OPERATOR_REF']}\n"
              f"REFRESH_REASON={os.environ['CRYPTO_ASTRO_REFRESH_REASON']}\n"
          )
          text, count = re.subn(
              r"(GENERATED_AT_UTC=[^\n]+\n)(?:REFRESH_MODE=[^\n]*\nOPERATOR_REF=[^\n]*\nREFRESH_REASON=[^\n]*\n)?",
              r"\1" + metadata,
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("OPERATOR_REVIEW_METADATA_ANCHOR_MISSING")
          boundary = (
              "Workflow may push one fully validated review branch and open one review PR. "
              "It may not merge or issue a deployment command. Publication follows only "
              "after explicit merge authorization."
          )
          text = text.replace("No push, no PR, no deploy.", boundary)
          if boundary not in text:
              raise SystemExit("OPERATOR_REVIEW_BOUNDARY_NOT_MATERIALIZED")
          path.write_text(text, encoding="utf-8")
          print("OPERATOR_REVIEW_CADENCE_METADATA=PASS")
          PY

      - name: Validate generated bundle with current BHRIGU consumer
        id: consumer
        run: |
          python3 tools/crypto_astro_static_refresh/test_bhrigu_consumer_contract_v0_1.py
          rm -rf /tmp/bhrigu-portal-consumer
          git clone --depth 1 --branch master https://github.com/AiBhrigu/bhrigu-portal.git /tmp/bhrigu-portal-consumer
          npm ci --prefix /tmp/bhrigu-portal-consumer
          BTC_PRODUCER_SNAPSHOT_PATH="$GITHUB_WORKSPACE/site/crypto-astro/data/crypto_astro_snapshot.public.json" \
          BTC_PRODUCER_PROOF_PATH="$GITHUB_WORKSPACE/site/crypto-astro/data/crypto_astro_snapshot_proof.public.json" \
          BTC_PRODUCER_MARKET_FIELD_PATH="$GITHUB_WORKSPACE/site/crypto-astro/data/market_field_snapshot.public.v0_1.json" \
            npm --prefix /tmp/bhrigu-portal-consumer run verify:btc-producer-contract

      - name: Validate data-stage file scope
        id: changes
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              'site/crypto-astro/index.html',
              'site/crypto-astro/data/crypto_astro_snapshot.public.json',
              'site/crypto-astro/data/crypto_astro_snapshot_proof.public.json',
              'site/crypto-astro/data/crypto_astro_module_bindings.public.json',
              'site/crypto-astro/data/crypto_astro_module_bindings.public.schema.json',
              'site/crypto-astro/data/market_field_snapshot.public.v0_1.json',
              'site/crypto-astro/data/scoring_snapshot.public.json',
              'docs/crypto-astro-service/crypto_astro_snapshot_summary.md',
              'docs/crypto-astro-service/crypto_astro_operator_review.md',
          }
          required = allowed - {'site/crypto-astro/data/crypto_astro_module_bindings.public.schema.json'}
          lines = subprocess.check_output(['git','status','--porcelain'], text=True).splitlines()
          changed = set()
          for line in lines:
              raw = line[3:] if len(line) >= 4 and line[2] == ' ' else line.split(None, 1)[-1]
              changed.add(raw.split(' -> ')[-1].strip())
          if not changed:
              print('changed=false')
              with open(__import__('os').environ['GITHUB_OUTPUT'], 'a') as out:
                  out.write('changed=false\n')
              raise SystemExit(0)
          assert required <= changed <= allowed, {'missing': sorted(required-changed), 'unexpected': sorted(changed-allowed)}
          print('DATA_STAGE_SCOPE=PASS')
          with open(__import__('os').environ['GITHUB_OUTPUT'], 'a') as out:
              out.write('changed=true\n')
          PY

      - name: Create local data commit
        id: data_commit
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add \
            site/crypto-astro/index.html \
            site/crypto-astro/data/crypto_astro_snapshot.public.json \
            site/crypto-astro/data/crypto_astro_snapshot_proof.public.json \
            site/crypto-astro/data/crypto_astro_module_bindings.public.json \
            site/crypto-astro/data/crypto_astro_module_bindings.public.schema.json \
            site/crypto-astro/data/market_field_snapshot.public.v0_1.json \
            site/crypto-astro/data/scoring_snapshot.public.json \
            docs/crypto-astro-service/crypto_astro_snapshot_summary.md \
            docs/crypto-astro-service/crypto_astro_operator_review.md
          git commit -m "Crypto-Astro: automated static market snapshot refresh"
          echo "DATA_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Build Snapshot Memory twice from exact accepted pair
        id: memory_build
        if: steps.changes.outputs.changed == 'true'
        run: |
          rm -rf /tmp/crypto-astro-memory-a /tmp/crypto-astro-memory-b
          python tools/crypto_astro_snapshot_memory/build_snapshot_memory.py \
            --repo . --base-ref "$BASE_SHA" --current-ref "$DATA_COMMIT_SHA" \
            --out-dir /tmp/crypto-astro-memory-a
          python tools/crypto_astro_snapshot_memory/build_snapshot_memory.py \
            --repo . --base-ref "$BASE_SHA" --current-ref "$DATA_COMMIT_SHA" \
            --out-dir /tmp/crypto-astro-memory-b
          cmp /tmp/crypto-astro-memory-a/site/crypto-astro/data/crypto_astro_snapshot_registry.public.json \
              /tmp/crypto-astro-memory-b/site/crypto-astro/data/crypto_astro_snapshot_registry.public.json
          cmp /tmp/crypto-astro-memory-a/site/crypto-astro/data/crypto_astro_snapshot_delta.public.json \
              /tmp/crypto-astro-memory-b/site/crypto-astro/data/crypto_astro_snapshot_delta.public.json
          cp /tmp/crypto-astro-memory-a/site/crypto-astro/data/crypto_astro_snapshot_registry.public.json \
             site/crypto-astro/data/crypto_astro_snapshot_registry.public.json
          cp /tmp/crypto-astro-memory-a/site/crypto-astro/data/crypto_astro_snapshot_delta.public.json \
             site/crypto-astro/data/crypto_astro_snapshot_delta.public.json

      - name: Verify memory, render static UI, and create local materialization commit
        id: memory
        if: steps.changes.outputs.changed == 'true'
        run: |
          python -m unittest discover -s tools/crypto_astro_snapshot_memory -p 'test_*.py' -v
          python tools/crypto_astro_snapshot_memory/verify_snapshot_memory.py --repo . \
            --report "$CRYPTO_ASTRO_REFRESH_OUT/snapshot-memory-verification.json"
          python -m unittest discover -s tools/crypto_astro_what_changed -p 'test_*.py' -v
          python tools/crypto_astro_what_changed/render_what_changed.py --repo .
          python tools/crypto_astro_what_changed/verify_what_changed.py --repo . \
            --report "$CRYPTO_ASTRO_REFRESH_OUT/what-changed-verification.json"
          python - <<'PY'
          import subprocess
          changed = set(subprocess.check_output(['git','diff','--name-only','HEAD'], text=True).splitlines())
          expected = {
              'site/crypto-astro/index.html',
              'site/crypto-astro/data/crypto_astro_snapshot_registry.public.json',
              'site/crypto-astro/data/crypto_astro_snapshot_delta.public.json',
          }
          assert changed == expected, {'missing': sorted(expected-changed), 'unexpected': sorted(changed-expected)}
          print('MEMORY_STAGE_SCOPE=PASS')
          PY
          git add \
            site/crypto-astro/index.html \
            site/crypto-astro/data/crypto_astro_snapshot_registry.public.json \
            site/crypto-astro/data/crypto_astro_snapshot_delta.public.json
          git commit -m "Crypto-Astro: materialize accepted snapshot memory"

      - name: Prove atomic final branch before any push
        id: atomic
        if: steps.changes.outputs.changed == 'true'
        run: |
          python - <<'PY'
          import os, subprocess
          required = {
              'site/crypto-astro/index.html',
              'site/crypto-astro/data/crypto_astro_snapshot.public.json',
              'site/crypto-astro/data/crypto_astro_snapshot_proof.public.json',
              'site/crypto-astro/data/crypto_astro_module_bindings.public.json',
              'site/crypto-astro/data/market_field_snapshot.public.v0_1.json',
              'site/crypto-astro/data/scoring_snapshot.public.json',
              'site/crypto-astro/data/crypto_astro_snapshot_registry.public.json',
              'site/crypto-astro/data/crypto_astro_snapshot_delta.public.json',
              'docs/crypto-astro-service/crypto_astro_snapshot_summary.md',
              'docs/crypto-astro-service/crypto_astro_operator_review.md',
          }
          optional = {'site/crypto-astro/data/crypto_astro_module_bindings.public.schema.json'}
          changed = set(subprocess.check_output(['git','diff','--name-only',os.environ['BASE_SHA'],'HEAD'], text=True).splitlines())
          assert changed in (required, required | optional), {'missing': sorted(required-changed), 'unexpected': sorted(changed-required-optional)}
          assert subprocess.check_output(['git','status','--porcelain'], text=True).strip() == ''
          print('ATOMIC_REFRESH_BRANCH=PASS')
          PY
          python tools/crypto_astro_snapshot_memory/verify_snapshot_memory.py --repo .
          python tools/crypto_astro_what_changed/render_what_changed.py --repo .
          git diff --exit-code
          python tools/crypto_astro_what_changed/verify_what_changed.py --repo .
          python tools/crypto_astro_static_refresh/test_bhrigu_consumer_contract_v0_1.py

      - name: Push complete branch only after full PASS
        id: push_branch
        if: steps.changes.outputs.changed == 'true'
        run: git push -u origin "$CRYPTO_ASTRO_REFRESH_BRANCH"

      - name: Open review PR only
        id: open_pr
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/crypto_astro_refresh_pr_body.md <<BODY
          Atomic static Crypto-Astro refresh generated by manual workflow dispatch.

          Dispatch record:
          - Refresh mode: ${CRYPTO_ASTRO_REFRESH_MODE}
          - Operator reference: ${CRYPTO_ASTRO_OPERATOR_REF}
          - Reason: ${CRYPTO_ASTRO_REFRESH_REASON}
          - Base SHA: ${BASE_SHA}
          - Assistant dispatch issue: ${CRYPTO_ASTRO_DISPATCH_REQUEST_ISSUE:-none}

          Includes the verified public snapshot, proof, bindings, derived static surfaces, dynamic accepted-pair registry/delta, and statically rendered What Changed section.

          Review boundary:
          - review PR only; no auto-merge and no deploy command
          - BHRIGU BTC Field Read consumer compatibility must PASS before push
          - desktop and mobile visual review are required before explicit merge authorization
          - publication follows only after explicit merge authorization and accepted merge to main
          - no cron, backend, API, payment, live-adapter claim, forecast, trading signal, price target, or investment recommendation
          - no A/E activation, C/T runtime, formula-weight disclosure, or ORION core exposure
          BODY
          PR_URL=$(gh pr create --base main --head "$CRYPTO_ASTRO_REFRESH_BRANCH" \
            --title "Crypto-Astro: automated static market snapshot refresh" \
            --body-file /tmp/crypto_astro_refresh_pr_body.md)
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Upload failure or success report
        id: report_upload
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: crypto-astro-static-refresh-report
          path: ${{ env.CRYPTO_ASTRO_REFRESH_OUT }}/
          if-no-files-found: ignore

      - name: Return assistant dispatch callback
        if: ${{ always() && env.CRYPTO_ASTRO_DISPATCH_REQUEST_ISSUE != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          PREFLIGHT_OUTCOME: ${{ steps.preflight.outcome }}
          METHODOLOGY_OUTCOME: ${{ steps.methodology.outcome }}
          SOURCE_OUTCOME: ${{ steps.source_refresh.outcome }}
          CONSUMER_OUTCOME: ${{ steps.consumer.outcome }}
          SCOPE_OUTCOME: ${{ steps.changes.outcome }}
          MEMORY_BUILD_OUTCOME: ${{ steps.memory_build.outcome }}
          MEMORY_OUTCOME: ${{ steps.memory.outcome }}
          ATOMIC_OUTCOME: ${{ steps.atomic.outcome }}
          PUSH_OUTCOME: ${{ steps.push_branch.outcome }}
          OPEN_PR_OUTCOME: ${{ steps.open_pr.outcome }}
          MATERIAL_CHANGE: ${{ steps.changes.outputs.changed }}
          GENERATED_PR_URL: ${{ steps.open_pr.outputs.pr_url }}
        run: |
          set -euo pipefail
          ISSUE="$CRYPTO_ASTRO_DISPATCH_REQUEST_ISSUE"
          if [[ ! "$ISSUE" =~ ^[0-9]+$ ]]; then
            echo "DISPATCH_REQUEST_ISSUE_MUST_BE_NUMERIC"
            exit 1
          fi

          gh issue view "$ISSUE" --json body --jq .body > /tmp/crypto_astro_dispatch_issue_body.txt
          REQUEST_ID=$(python3 - <<'PY'
          from pathlib import Path
          values = {}
          for line in Path("/tmp/crypto_astro_dispatch_issue_body.txt").read_text(encoding="utf-8").splitlines():
              if "=" in line:
                  key, value = line.split("=", 1)
                  values[key] = value
          request_id = values.get("REQUEST_ID", "UNRESOLVED")
          if not request_id:
              request_id = "UNRESOLVED"
          print(request_id)
          PY
          )

          MATERIAL_VALUE=${MATERIAL_CHANGE:-unknown}
          PR_VALUE=${GENERATED_PR_URL:-none}
          BASE_VALUE=${BASE_SHA:-unavailable}
          EXPECTED_VALUE=${CRYPTO_ASTRO_EXPECTED_MAIN_SHA:-unavailable}

          if [ "$JOB_STATUS" = "success" ] && [ "$MATERIAL_VALUE" = "true" ] && [ "$OPEN_PR_OUTCOME" = "success" ]; then
            FINAL_OUTCOME=PASS_REVIEW_PR_OPENED
          elif [ "$JOB_STATUS" = "success" ] && [ "$MATERIAL_VALUE" = "false" ]; then
            FINAL_OUTCOME=PASS_NO_MATERIAL_CHANGE
          elif [ "$PREFLIGHT_OUTCOME" != "success" ]; then
            FINAL_OUTCOME=FAIL_PREFLIGHT
          elif [ "$METHODOLOGY_OUTCOME" = "failure" ]; then
            FINAL_OUTCOME=FAIL_METHODOLOGY
          elif [ "$SOURCE_OUTCOME" = "failure" ]; then
            FINAL_OUTCOME=FAIL_SOURCE_OR_SCHEMA
          elif [ "$CONSUMER_OUTCOME" = "failure" ]; then
            FINAL_OUTCOME=FAIL_CONSUMER
          elif [ "$SCOPE_OUTCOME" = "failure" ]; then
            FINAL_OUTCOME=FAIL_SCOPE
          elif [ "$MEMORY_BUILD_OUTCOME" = "failure" ] || [ "$MEMORY_OUTCOME" = "failure" ]; then
            FINAL_OUTCOME=FAIL_MEMORY
          elif [ "$ATOMIC_OUTCOME" = "failure" ]; then
            FINAL_OUTCOME=FAIL_ATOMICITY
          elif [ "$PUSH_OUTCOME" = "failure" ]; then
            FINAL_OUTCOME=FAIL_PUSH
          elif [ "$OPEN_PR_OUTCOME" = "failure" ]; then
            FINAL_OUTCOME=FAIL_PR_OPEN
          else
            FINAL_OUTCOME=FAIL_PIPELINE
          fi

          cat > /tmp/crypto_astro_dispatch_callback.txt <<CALLBACK
          SCHEMA=crypto_astro_assistant_dispatch_callback_v0_1
          DISPATCH_REQUEST_ID=${REQUEST_ID}
          WORKFLOW_RUN_ID=${GITHUB_RUN_ID}
          WORKFLOW_RUN_URL=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EXPECTED_MAIN_SHA=${EXPECTED_VALUE}
          ACTUAL_BASE_SHA=${BASE_VALUE}
          JOB_STATUS=${JOB_STATUS}
          MATERIAL_CHANGE=${MATERIAL_VALUE}
          GENERATED_BRANCH=${CRYPTO_ASTRO_REFRESH_BRANCH}
          GENERATED_PR_URL=${PR_VALUE}
          FINAL_OUTCOME=${FINAL_OUTCOME}
          CALLBACK

          gh issue comment "$ISSUE" --body-file /tmp/crypto_astro_dispatch_callback.txt
          gh issue close "$ISSUE" --reason completed
          gh issue lock "$ISSUE" --reason resolved
          echo "ASSISTANT_DISPATCH_CALLBACK=PASS"
