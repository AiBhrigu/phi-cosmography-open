name: Crypto-Astro Static Refresh Manual

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "tools/crypto_astro_static_refresh/**"
      - ".github/workflows/crypto-astro-static-refresh-manual.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: crypto-astro-static-refresh-manual
  cancel-in-progress: false

jobs:
  refresh:
    name: Run static refresh and open review PR
    runs-on: ubuntu-latest
    env:
      CRYPTO_ASTRO_REFRESH_BRANCH: automation/crypto-astro-static-refresh-${{ github.run_id }}
      CRYPTO_ASTRO_REFRESH_OUT: /tmp/crypto_astro_static_refresh_output
      COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify DeFi TVL methodology contract
        run: python3 tools/crypto_astro_static_refresh/test_defi_tvl_methodology_v0_1.py

      - name: Run hardened static refresh
        run: |
          rm -rf "$CRYPTO_ASTRO_REFRESH_OUT"
          mkdir -p "$CRYPTO_ASTRO_REFRESH_OUT"
          python3 tools/crypto_astro_static_refresh/crypto_astro_static_refresh_hardened_v0_5.py             "$GITHUB_WORKSPACE"             "$CRYPTO_ASTRO_REFRESH_OUT"

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No static refresh diff produced."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git status --short
            git diff --stat
          fi

      - name: Commit and push refresh branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add             site/crypto-astro/index.html             site/crypto-astro/data/crypto_astro_snapshot.public.json             site/crypto-astro/data/crypto_astro_snapshot_proof.public.json             site/crypto-astro/data/crypto_astro_module_bindings.public.json             site/crypto-astro/data/crypto_astro_module_bindings.public.schema.json             site/crypto-astro/data/market_field_snapshot.public.v0_1.json             site/crypto-astro/data/scoring_snapshot.public.json             docs/crypto-astro-service/crypto_astro_snapshot_summary.md             docs/crypto-astro-service/crypto_astro_operator_review.md
          git commit -m "Crypto-Astro: automated static market snapshot refresh"
          git push -u origin "$CRYPTO_ASTRO_REFRESH_BRANCH"

      - name: Create review PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/crypto_astro_refresh_pr_body.md <<'BODY'
          Static public market snapshot refresh generated by the trusted Crypto-Astro refresh workflow.

          Trigger:
          - `${{ github.event_name }}`

          Scope:
          - refresh public snapshot JSON
          - refresh proof JSON
          - refresh module bindings
          - sync market field and scoring snapshots
          - update Crypto-Astro static HTML values
          - update operator summary/review docs

          Boundary:
          - no backend/API activation
          - no payment activation
          - no live adapter claim
          - no trading signal
          - no forecast
          - no price target
          - no investment advice

          Review gate:
          - this workflow opens a PR only
          - no auto-merge
          - no scheduled cron
          BODY
          gh pr create             --base main             --head "$CRYPTO_ASTRO_REFRESH_BRANCH"             --title "Crypto-Astro: automated static market snapshot refresh"             --body-file /tmp/crypto_astro_refresh_pr_body.md

      - name: Upload refresh report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-astro-static-refresh-report
          path: ${{ env.CRYPTO_ASTRO_REFRESH_OUT }}/
          if-no-files-found: ignore
