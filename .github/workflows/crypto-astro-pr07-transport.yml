name: Crypto-Astro PR-07 Transport Repair

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  repair:
    if: >-
      github.event.issue.pull_request &&
      github.event.issue.number == 136 &&
      github.event.comment.body == '/run-pr07-transport'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out bounded PR branch
        uses: actions/checkout@v5
        with:
          ref: agent/crypto-astro-pr07-what-changed-ui
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build exact PR-07 production files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tools/crypto_astro_what_changed site/theme

          cat > tools/crypto_astro_what_changed/render_what_changed.py <<'PY'
          #!/usr/bin/env python3
          """Render the committed Snapshot Memory delta into static public HTML."""
          from __future__ import annotations

          import argparse
          import html
          import json
          import re
          from decimal import Decimal, ROUND_HALF_UP
          from pathlib import Path

          METRICS = (
              ("btc_gravity_pct", "BTC gravity"),
              ("stablecoin_share_pct", "Stablecoin share"),
              ("alt_breadth_24h_pct", "Alt breadth · 24h"),
              ("alt_breadth_7d_pct", "Alt breadth · 7d"),
              ("market_field_score", "Market Field Score"),
              ("regime_label", "Regime"),
          )
          UNITS = {
              "percentage_points": "percentage points",
              "score_points": "points",
          }
          SECTION_PATTERN = re.compile(
              r'<section id="what-changed".*?</section>\n(?=<!-- BTC_PHI_CYCLE_HUB_SURFACE_LIFT_v0_1:BEGIN -->)',
              re.S,
          )
          CSS_LINK = '<link href="../theme/crypto_astro_what_changed.css" rel="stylesheet"/>'
          CSS_ANCHOR = '<link href="../theme/crypto_astro_surface.css" rel="stylesheet"/>'

          def load_json(path: Path) -> dict:
              return json.loads(path.read_text(encoding="utf-8"))

          def snapshot_time(snapshot_id: str) -> str:
              parts = snapshot_id.split(":")
              if len(parts) < 3:
                  raise ValueError(f"Invalid snapshot id: {snapshot_id}")
              return parts[1]

          def decimal_display(value: str, precision: int) -> str:
              quantum = Decimal("1").scaleb(-precision)
              return format(Decimal(str(value)).quantize(quantum, rounding=ROUND_HALF_UP), f".{precision}f")

          def displayed_value(metric: dict, field: str) -> str:
              value = metric[field]
              if metric["type"] == "CATEGORICAL":
                  return html.escape(str(value))
              precision = int(metric["display_precision"])
              text = decimal_display(str(value), precision)
              if metric["unit"] == "percent":
                  text += "%"
              return html.escape(text)

          def metric_card(key: str, label: str, metric: dict) -> str:
              if metric.get("status") != "COMPARABLE":
                  raise ValueError(f"Metric is not comparable: {key}")
              previous = displayed_value(metric, "previous_value")
              current = displayed_value(metric, "current_value")
              if metric.get("type") == "CATEGORICAL":
                  transition = str(metric.get("transition", "")).upper()
                  if transition != "UNCHANGED":
                      delta = html.escape(transition.title())
                      direction = "changed"
                  else:
                      delta = "Unchanged"
                      direction = "unchanged"
              else:
                  delta = f'{html.escape(str(metric["display_delta"]))} {html.escape(UNITS[metric["delta_unit"]])}'
                  direction = str(metric["direction"]).lower()
              return f'''      <article class="what-changed-metric-v0-1" data-metric="{key}" data-direction="{direction}">
                <span>{html.escape(label)}</span>
                <strong>{delta}</strong>
                <small>{previous} → {current}</small>
              </article>'''

          def validate_contract(registry: dict, delta: dict) -> None:
              if registry.get("schema_version") != "crypto_astro_snapshot_registry_public_v0_1":
                  raise ValueError("Unexpected registry schema")
              if registry.get("selection_policy") != "EXPLICIT_ACCEPTED_PAIR":
                  raise ValueError("Registry is not an explicit accepted pair")
              if delta.get("schema_version") != "crypto_astro_snapshot_delta_public_v0_1":
                  raise ValueError("Unexpected delta schema")
              if delta.get("comparison_status") != "PARTIAL_COMPARABLE":
                  raise ValueError("Delta is not partial-comparable")
              if registry["current"]["snapshot_id"] != delta["current_snapshot_id"]:
                  raise ValueError("Current snapshot id mismatch")
              if registry["previous"]["snapshot_id"] != delta["previous_snapshot_id"]:
                  raise ValueError("Previous snapshot id mismatch")
              for key in (
                  "read_only",
                  "static_public_snapshot",
                  "runtime_closed",
                  "backend_api_closed",
                  "payment_closed",
                  "orion_core_protected",
                  "no_forecast",
                  "no_trading_signal",
                  "no_price_target",
              ):
                  if delta.get("boundary", {}).get(key) is not True:
                      raise ValueError(f"Boundary mismatch: {key}")

          def render(registry: dict, delta: dict) -> str:
              validate_contract(registry, delta)
              cards = "\n".join(metric_card(key, label, delta["metrics"][key]) for key, label in METRICS)
              unavailable = delta["unavailable_metrics"]
              defi = unavailable["defi_tvl_usd"]
              liquidity = unavailable["liquidity_context_state"]
              if defi.get("delta_value") is not None or liquidity.get("delta_value") is not None:
                  raise ValueError("Unavailable metrics must not contain numeric deltas")
              current = html.escape(snapshot_time(delta["current_snapshot_id"]))
              previous = html.escape(snapshot_time(delta["previous_snapshot_id"]))
              generated = html.escape(str(delta["generated_at_utc"]))
              return f'''<section id="what-changed" class="editorial-what-changed-v0-1 editorial-chapter-v0-1 what-changed-memory-v0-1" data-editorial-chapter="what-changed" data-what-changed-status="partial-comparable" data-source-contract="crypto_astro_snapshot_delta_public_v0_1" aria-labelledby="what-changed-title">
            <div class="what-changed-memory-v0-1__head">
              <div>
                <p class="eyebrow">What Changed</p>
                <h2 id="what-changed-title">Verified change memory</h2>
                <p>Current and previous accepted snapshots are compared only where source, methodology, universe, and proof bindings remain compatible.</p>
              </div>
              <dl class="what-changed-memory-v0-1__snapshots" aria-label="Compared snapshot timestamps">
                <div><dt>Current</dt><dd>{current}</dd></div>
                <div><dt>Previous</dt><dd>{previous}</dd></div>
              </dl>
            </div>
            <div class="what-changed-memory-v0-1__grid" aria-label="Verified comparable changes">
          {cards}
            </div>
            <div class="what-changed-memory-v0-1__unavailable" role="note" aria-label="Unavailable comparisons">
              <strong>Methodology boundary preserved</strong>
              <span>DeFi TVL · unavailable <code>{html.escape(defi["reason_code"])}</code></span>
              <span>Liquidity context · unavailable <code>{html.escape(liquidity["reason_code"])}</code></span>
            </div>
            <p class="what-changed-memory-v0-1__meta">Static accepted-pair comparison · generated {generated}. No relative percentages, cached reconstruction, live feed, forecast, or trading signal.</p>
          </section>'''

          def apply(repo: Path) -> None:
              registry = load_json(repo / "site/crypto-astro/data/crypto_astro_snapshot_registry.public.json")
              delta = load_json(repo / "site/crypto-astro/data/crypto_astro_snapshot_delta.public.json")
              path = repo / "site/crypto-astro/index.html"
              source = path.read_text(encoding="utf-8")
              updated, count = SECTION_PATTERN.subn(render(registry, delta) + "\n", source)
              if count != 1:
                  raise ValueError(f"What Changed section count mismatch: {count}")
              if CSS_LINK not in updated:
                  if updated.count(CSS_ANCHOR) != 1:
                      raise ValueError("CSS anchor count mismatch")
                  updated = updated.replace(CSS_ANCHOR, CSS_ANCHOR + "\n" + CSS_LINK)
              if updated.count(CSS_LINK) != 1:
                  raise ValueError("What Changed CSS link count mismatch")
              path.write_text(updated, encoding="utf-8")

          if __name__ == "__main__":
              parser = argparse.ArgumentParser()
              parser.add_argument("--repo", default=".")
              args = parser.parse_args()
              apply(Path(args.repo).resolve())
          PY

          cat > tools/crypto_astro_what_changed/verify_what_changed.py <<'PY'
          #!/usr/bin/env python3
          from __future__ import annotations

          import argparse
          import hashlib
          import json
          import re
          from pathlib import Path

          EXPECTED = {
              "btc_gravity_pct": "+0.28 percentage points",
              "stablecoin_share_pct": "-0.18 percentage points",
              "alt_breadth_24h_pct": "+8.0 percentage points",
              "alt_breadth_7d_pct": "-1.3 percentage points",
              "market_field_score": "+1.0 points",
              "regime_label": "Unchanged",
          }

          def verify(repo: Path) -> dict:
              html_path = repo / "site/crypto-astro/index.html"
              source = html_path.read_text(encoding="utf-8")
              failures: list[str] = []
              if source.count('data-what-changed-status="partial-comparable"') != 1:
                  failures.append("partial-comparable status count")
              if source.count('data-source-contract="crypto_astro_snapshot_delta_public_v0_1"') != 1:
                  failures.append("source contract count")
              for key, display in EXPECTED.items():
                  if source.count(f'data-metric="{key}"') != 1:
                      failures.append(f"{key} count")
                  if source.count(display) != 1:
                      failures.append(f"{key} display")
              for code in ("METHODOLOGY_MISMATCH", "DEPENDENCY_METHODOLOGY_MISMATCH"):
                  if source.count(code) != 1:
                      failures.append(f"{code} count")
              section = re.search(r'<section id="what-changed".*?</section>', source, re.S)
              if section is None:
                  failures.append("What Changed section missing")
              else:
                  lowered = section.group(0).lower()
                  for term in ("fetch(", "xmlhttprequest", "websocket(", "eventsource("):
                      if term in lowered:
                          failures.append(f"forbidden browser runtime: {term}")
              if source.count('href="https://www.bhrigu.io/crypto-astro/btc"') != 2:
                  failures.append("BTC CTA count drift")
              if source.count('style="--btc-dominance:56.5%;"') != 1:
                  failures.append("BTC geometry drift")
              if source.count('../theme/crypto_astro_what_changed.css') != 1:
                  failures.append("CSS link count")
              result = {
                  "node": "CRYPTO_ASTRO_PR_07_WHAT_CHANGED_UI_BINDING_IMPLEMENTATION_v0_1",
                  "status": "PASS" if not failures else "FAIL",
                  "failures": failures,
                  "html_sha256": hashlib.sha256(html_path.read_bytes()).hexdigest(),
                  "comparable_metric_count": 6,
                  "unavailable_metric_count": 2,
                  "browser_fetch": False,
                  "refresh_pipeline_integration": False,
              }
              if failures:
                  raise AssertionError(json.dumps(result, indent=2))
              return result

          if __name__ == "__main__":
              parser = argparse.ArgumentParser()
              parser.add_argument("--repo", default=".")
              parser.add_argument("--report")
              args = parser.parse_args()
              result = verify(Path(args.repo).resolve())
              text = json.dumps(result, indent=2) + "\n"
              if args.report:
                  path = Path(args.report)
                  path.parent.mkdir(parents=True, exist_ok=True)
                  path.write_text(text, encoding="utf-8")
              print(text, end="")
          PY

          cat > tools/crypto_astro_what_changed/test_what_changed.py <<'PY'
          import importlib.util
          import tempfile
          import unittest
          from pathlib import Path

          MODULE_PATH = Path(__file__).with_name("render_what_changed.py")
          SPEC = importlib.util.spec_from_file_location("what_changed_renderer", MODULE_PATH)
          renderer = importlib.util.module_from_spec(SPEC)
          assert SPEC.loader is not None
          SPEC.loader.exec_module(renderer)

          class WhatChangedTests(unittest.TestCase):
              @staticmethod
              def numeric(display, direction, unit, precision=1, previous="1", current="2", value_unit="percent"):
                  return {
                      "status": "COMPARABLE",
                      "type": "NUMERIC",
                      "previous_value": previous,
                      "current_value": current,
                      "display_delta": display,
                      "display_precision": precision,
                      "direction": direction,
                      "delta_unit": unit,
                      "unit": value_unit,
                  }

              def setUp(self):
                  self.registry = {
                      "schema_version": "crypto_astro_snapshot_registry_public_v0_1",
                      "selection_policy": "EXPLICIT_ACCEPTED_PAIR",
                      "current": {"snapshot_id": "crypto-astro:2026-07-19T18:26:56Z:current"},
                      "previous": {"snapshot_id": "crypto-astro:2026-07-12T22:05:46Z:previous"},
                  }
                  self.delta = {
                      "schema_version": "crypto_astro_snapshot_delta_public_v0_1",
                      "comparison_status": "PARTIAL_COMPARABLE",
                      "current_snapshot_id": self.registry["current"]["snapshot_id"],
                      "previous_snapshot_id": self.registry["previous"]["snapshot_id"],
                      "generated_at_utc": "2026-07-19T18:26:56Z",
                      "boundary": {
                          "read_only": True,
                          "static_public_snapshot": True,
                          "runtime_closed": True,
                          "backend_api_closed": True,
                          "payment_closed": True,
                          "orion_core_protected": True,
                          "no_forecast": True,
                          "no_trading_signal": True,
                          "no_price_target": True,
                      },
                      "metrics": {
                          "btc_gravity_pct": self.numeric("+0.28", "UP", "percentage_points", 2, "56.216", "56.500"),
                          "stablecoin_share_pct": self.numeric("-0.18", "DOWN", "percentage_points", 2, "13.684", "13.500"),
                          "alt_breadth_24h_pct": self.numeric("+8.0", "UP", "percentage_points", 1, "26.5", "34.5"),
                          "alt_breadth_7d_pct": self.numeric("-1.3", "DOWN", "percentage_points", 1, "41.2", "39.9"),
                          "market_field_score": self.numeric("+1.0", "UP", "score_points", 1, "60", "61", "score_0_100"),
                          "regime_label": {
                              "status": "COMPARABLE",
                              "type": "CATEGORICAL",
                              "previous_value": "Balanced Expansion",
                              "current_value": "Balanced Expansion",
                              "transition": "UNCHANGED",
                          },
                      },
                      "unavailable_metrics": {
                          "defi_tvl_usd": {"delta_value": None, "reason_code": "METHODOLOGY_MISMATCH"},
                          "liquidity_context_state": {"delta_value": None, "reason_code": "DEPENDENCY_METHODOLOGY_MISMATCH"},
                      },
                  }

              def test_render_is_deterministic(self):
                  self.assertEqual(renderer.render(self.registry, self.delta), renderer.render(self.registry, self.delta))

              def test_six_comparable_metrics(self):
                  self.assertEqual(renderer.render(self.registry, self.delta).count("data-metric="), 6)

              def test_unavailable_metrics_have_no_numeric_delta(self):
                  output = renderer.render(self.registry, self.delta)
                  self.assertIn("DeFi TVL · unavailable", output)
                  self.assertIn("Liquidity context · unavailable", output)

              def test_boundary_fails_closed(self):
                  self.delta["boundary"]["runtime_closed"] = False
                  with self.assertRaises(ValueError):
                      renderer.render(self.registry, self.delta)

              def test_snapshot_pair_must_match(self):
                  self.delta["previous_snapshot_id"] = "wrong"
                  with self.assertRaises(ValueError):
                      renderer.render(self.registry, self.delta)

          if __name__ == "__main__":
              unittest.main()
          PY

          cat > site/theme/crypto_astro_what_changed.css <<'CSS'
          /* CRYPTO_ASTRO_PR_07_WHAT_CHANGED_UI_BINDING_v0_1 */
          .what-changed-memory-v0-1 {
            display: grid;
            gap: clamp(1rem, 2vw, 1.5rem);
            border: 1px solid rgba(213, 177, 91, 0.2);
            background: linear-gradient(145deg, rgba(10, 20, 32, 0.96), rgba(7, 13, 22, 0.98));
          }

          .what-changed-memory-v0-1__head {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(16rem, 0.48fr);
            gap: clamp(1rem, 3vw, 2.4rem);
            align-items: end;
          }

          .what-changed-memory-v0-1__head h2 {
            margin: 0.35rem 0 0.75rem;
          }

          .what-changed-memory-v0-1__snapshots {
            display: grid;
            gap: 0.55rem;
            margin: 0;
          }

          .what-changed-memory-v0-1__snapshots div {
            display: grid;
            grid-template-columns: 5rem minmax(0, 1fr);
            gap: 0.8rem;
            padding: 0.65rem 0.75rem;
            border: 1px solid rgba(147, 174, 196, 0.18);
