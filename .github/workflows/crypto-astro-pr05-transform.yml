name: Crypto-Astro PR-05 Editorial Transform

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  transform:
    if: github.head_ref == 'feature/crypto-astro-editorial-composition-cta-v0-1'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: feature/crypto-astro-editorial-composition-cta-v0-1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Accept PR-04 trend-memory state
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tools/crypto_astro_editorial_composition/apply_editorial_composition.py')
          text = path.read_text()
          old = r'''r'\s*<div class="trend-memory" aria-label="Trend Memory">.*?</div>' '''.strip()
          new = r'''r'\s*<div class="trend-memory(?:-unavailable)?"[^>]*>.*?</div>' '''.strip()
          assert old in text, 'trend-memory compatibility source not found'
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Run editorial fixtures
        run: python3 -m unittest discover -s tools/crypto_astro_editorial_composition -p "test_*.py" -v

      - name: Apply editorial composition
        run: |
          set +e
          python3 tools/crypto_astro_editorial_composition/apply_editorial_composition.py > editorial-transform.log 2>&1
          status=$?
          cat editorial-transform.log
          exit $status

      - name: Upload transform diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-astro-pr05-transform-diagnostics-${{ github.event.pull_request.number }}
          path: editorial-transform.log
          if-no-files-found: warn

      - name: Build deterministic CSS bundle
        run: python3 tools/crypto_astro_css_modules/build_css_modules.py --write --verify-source-base

      - name: Verify editorial composition
        run: python3 tools/crypto_astro_editorial_composition/verify_editorial_composition.py

      - name: Commit transformed surface and remove worker
        run: |
          rm .github/workflows/crypto-astro-pr05-transform.yml editorial-transform.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/crypto-astro/index.html site/theme/crypto_astro/css_order_manifest.json site/theme/crypto_astro_surface.css site/theme/crypto_astro/extensions/10_editorial_composition.css tools/crypto_astro_editorial_composition .github/workflows/crypto-astro-pr05-transform.yml
          git commit -m "Apply Crypto-Astro editorial composition and CTA"
          git push origin HEAD:feature/crypto-astro-editorial-composition-cta-v0-1
