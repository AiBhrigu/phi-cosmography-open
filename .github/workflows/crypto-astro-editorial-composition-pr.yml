name: Crypto-Astro Editorial Composition PR

on:
  pull_request:
    paths:
      - "site/crypto-astro/index.html"
      - "site/theme/crypto_astro_surface.css"
      - "site/theme/crypto_astro/css_order_manifest.json"
      - "site/theme/crypto_astro/extensions/10_editorial_composition.css"
      - "tools/crypto_astro_editorial_composition/**"
      - "tools/crypto_astro_geometry_truth/verify_geometry_truth.py"
      - ".github/workflows/crypto-astro-editorial-composition-pr.yml"

permissions:
  contents: read

jobs:
  editorial-composition:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enforce bounded PR-05 path scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess

          allowed = {
              ".github/workflows/crypto-astro-editorial-composition-pr.yml",
              "site/crypto-astro/index.html",
              "site/theme/crypto_astro/css_order_manifest.json",
              "site/theme/crypto_astro/extensions/10_editorial_composition.css",
              "site/theme/crypto_astro_surface.css",
              "tools/crypto_astro_editorial_composition/apply_editorial_composition.py",
              "tools/crypto_astro_editorial_composition/test_verify_editorial_composition.py",
              "tools/crypto_astro_editorial_composition/verify_editorial_composition.py",
              "tools/crypto_astro_geometry_truth/verify_geometry_truth.py",
          }
          changed = subprocess.check_output(
              ["git", "diff", "--name-only", os.environ["BASE_SHA"], os.environ["HEAD_SHA"]],
              text=True,
          ).splitlines()
          unexpected = sorted(set(changed) - allowed)
          assert not unexpected, f"Unexpected PR-05 paths: {unexpected}"
          required = {
              "site/crypto-astro/index.html",
              "site/theme/crypto_astro/css_order_manifest.json",
              "site/theme/crypto_astro/extensions/10_editorial_composition.css",
              "site/theme/crypto_astro_surface.css",
              "tools/crypto_astro_editorial_composition/verify_editorial_composition.py",
          }
          assert required.issubset(changed), f"Missing PR-05 paths: {sorted(required - set(changed))}"
          assert ".github/workflows/crypto-astro-pr05-transform.yml" not in changed
          print("PR_05_ALLOWED_PATHS=PASS")
          PY

      - name: Install browser dependencies
        run: python3 -m pip install --disable-pip-version-check selenium==4.34.2 pillow==11.3.0

      - name: Run editorial and geometry fixtures
        run: |
          python3 -m unittest discover -s tools/crypto_astro_editorial_composition -p "test_*.py" -v
          python3 -m unittest discover -s tools/crypto_astro_geometry_truth -p "test_*.py" -v

      - name: Verify deterministic CSS bundle
        run: |
          mkdir -p artifacts
          python3 tools/crypto_astro_css_modules/build_css_modules.py --verify-source-base > artifacts/css-module-build-report.json

      - name: Verify editorial contract
        run: python3 tools/crypto_astro_editorial_composition/verify_editorial_composition.py --out artifacts/editorial-composition-report.json

      - name: Verify geometry contract remains valid
        run: python3 tools/crypto_astro_geometry_truth/verify_geometry_truth.py --out artifacts/geometry-truth-report.json

      - name: Run local truth on final head
        run: bash tools/crypto_astro_local_truth/run_local_truth.sh "$GITHUB_WORKSPACE" artifacts/head 4173

      - name: Verify preserved source and BTC invariants
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          base = subprocess.check_output(
              ["git", "show", f"{os.environ['BASE_SHA']}:site/crypto-astro/index.html"],
              text=True,
          )
          head = Path("site/crypto-astro/index.html").read_text(encoding="utf-8")

          core_re = re.compile(r'<article class="btc-field-v1".*?</article>', re.S)
          base_core = core_re.search(base)
          head_core = core_re.search(head)
          assert base_core and head_core
          assert base_core.group(0) == head_core.group(0), "BTC data-bound field core changed"

          accepted = [
              "$2.287T", "$40.71B", "56.5%", "13.5%", "34.5%", "39.9%",
              "9.8%", "66.3%", "$308.81B", "$75.55B", "$4.65B",
              "2026-07-19T18:26:56Z",
          ]
          for value in accepted:
              assert value in head, f"Accepted public value missing: {value}"

          report = json.loads(Path("artifacts/head/surface-truth-report.json").read_text())
          assert report["status"] == "PASS", report.get("failures")
          measurements = report["measurements"]
          assert measurements["btc_running_animations"] == 0
          assert measurements["desktop_scroll_width"] == 1440
          assert measurements["mobile_scroll_width"] == 390
          assert measurements["browser_severe_errors"] == 0

          evidence = {
              "schema_version": "crypto_astro_editorial_invariant_report_v0_1",
              "status": "PASS",
              "btc_data_bound_core_exact": True,
              "accepted_public_values_preserved": accepted,
              "local_truth": report["status"],
              "btc_running_animations": measurements["btc_running_animations"],
              "desktop_scroll_width": measurements["desktop_scroll_width"],
              "mobile_scroll_width": measurements["mobile_scroll_width"],
              "browser_severe_errors": measurements["browser_severe_errors"],
          }
          Path("artifacts/editorial-invariant-report.json").write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print("PR_05_PRESERVED_INVARIANTS=PASS")
          PY

      - name: Upload PR-05 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-astro-editorial-composition-${{ github.event.pull_request.number }}
          path: artifacts/
          if-no-files-found: error
