name: Crypto-Astro Public HTTP Proof Dispatch PR

on:
  pull_request:
    paths:
      - '.github/workflows/crypto-astro-public-http-proof-dispatch.yml'
      - '.github/workflows/crypto-astro-public-http-proof-dispatch-pr.yml'
      - 'tools/crypto_astro_public_http_proof/verify_public_http_proof_dispatch.py'
      - 'tools/crypto_astro_public_http_proof/test_verify_public_http_proof_dispatch.py'
      - 'docs/crypto-astro-service/crypto_astro_public_http_proof_dispatch_v0_1.json'
      - 'docs/crypto-astro-service/CRYPTO_ASTRO_PUBLIC_HTTP_PROOF_DISPATCH_v0_1.md'

permissions:
  contents: read

jobs:
  public-http-proof-dispatch:
    name: Validate owner-authenticated proof dispatch bridge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate exact implementation scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          full_scope = {
              '.github/workflows/crypto-astro-public-http-proof-dispatch.yml',
              '.github/workflows/crypto-astro-public-http-proof-dispatch-pr.yml',
              'tools/crypto_astro_public_http_proof/verify_public_http_proof_dispatch.py',
              'tools/crypto_astro_public_http_proof/test_verify_public_http_proof_dispatch.py',
              'docs/crypto-astro-service/crypto_astro_public_http_proof_dispatch_v0_1.json',
              'docs/crypto-astro-service/CRYPTO_ASTRO_PUBLIC_HTTP_PROOF_DISPATCH_v0_1.md',
          }
          bounded_repair_scope = {
              '.github/workflows/crypto-astro-public-http-proof-dispatch.yml',
              '.github/workflows/crypto-astro-public-http-proof-dispatch-pr.yml',
          }
          base = subprocess.check_output(
              ['git', 'merge-base', os.environ['BASE_SHA'], os.environ['HEAD_SHA']],
              text=True,
          ).strip()
          changed = set(
              subprocess.check_output(
                  ['git', 'diff', '--name-only', base, os.environ['HEAD_SHA']],
                  text=True,
              ).splitlines()
          )
          allowed = {
              'FULL_IMPLEMENTATION': full_scope,
              'BOUNDED_WORKFLOW_REPAIR': bounded_repair_scope,
          }
          scope_name = next((name for name, paths in allowed.items() if changed == paths), None)
          assert scope_name is not None, {
              'changed': sorted(changed),
              'allowed_scopes': {name: sorted(paths) for name, paths in allowed.items()},
          }
          report = {
              'schema_version': 'crypto_astro_public_http_proof_dispatch_pr_scope_v0_1',
              'status': 'PASS',
              'scope_name': scope_name,
              'base_sha': os.environ['BASE_SHA'],
              'head_sha': os.environ['HEAD_SHA'],
              'changed_files': sorted(changed),
          }
          Path('artifacts/exact-scope.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          print('PUBLIC_HTTP_PROOF_DISPATCH_EXACT_SCOPE=PASS')
          print(f'PUBLIC_HTTP_PROOF_DISPATCH_SCOPE={scope_name}')
          PY

      - name: Run fail-closed request and repository fixtures
        run: |
          set -o pipefail
          python -m py_compile \
            tools/crypto_astro_public_http_proof/verify_public_http_proof_dispatch.py
          python -m unittest \
            tools.crypto_astro_public_http_proof.test_verify_public_http_proof_dispatch -v \
            2>&1 | tee artifacts/unit-tests.log

      - name: Verify fixed bridge, target, policy and documentation
        run: |
          set -o pipefail
          python tools/crypto_astro_public_http_proof/verify_public_http_proof_dispatch.py verify-repository \
            --repo . \
            --report artifacts/public-http-proof-dispatch-verification.json \
            2>&1 | tee artifacts/repository-verification.log

      - name: Verify exact preflight reason callback contract
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('.github/workflows/crypto-astro-public-http-proof-dispatch.yml')
          text = path.read_text(encoding='utf-8')
          required_codes = [
              'FAIL_MAIN_FETCH',
              'FAIL_MAIN_SHA_RESOLVE',
              'FAIL_MAIN_SHA_MISMATCH',
              'FAIL_TARGET_WORKFLOW_FILE_MISSING',
              'FAIL_TARGET_WORKFLOW_DISPATCH_TRIGGER_MISSING',
              'FAIL_CURRENT_ISSUE_VIEW',
              'FAIL_CURRENT_ISSUE_NUMBER_PARSE',
              'FAIL_CURRENT_ISSUE_STATE_PARSE',
              'FAIL_CURRENT_ISSUE_TITLE_PARSE',
              'FAIL_CURRENT_ISSUE_NUMBER_MISMATCH',
              'FAIL_CURRENT_ISSUE_NOT_OPEN',
              'FAIL_CURRENT_ISSUE_TITLE_MISMATCH',
              'FAIL_OPEN_REQUEST_LIST',
              'FAIL_OPEN_REQUEST_COUNT_PARSE',
              'FAIL_OTHER_OPEN_REQUESTS_PRESENT',
              'FAIL_EFFECTIVE_OPEN_REQUEST_COUNT',
              'FAIL_ACTIVE_PROOF_RUN_LIST',
              'FAIL_ACTIVE_PROOF_RUNS_PRESENT',
              'FAIL_PREFLIGHT_REASON_MISSING',
          ]
          failures = []
          for code in required_codes:
              if code not in text:
                  failures.append(f'missing:{code}')
          markers = [
              'fail_preflight()',
              'echo "reason_code=$1" >> "$GITHUB_OUTPUT"',
              'PREFLIGHT_REASON_CODE=${PREFLIGHT_REASON_CODE}',
              'PREFLIGHT_REASON_CODE:',
              'steps.preflight.outputs.reason_code',
              'FINAL_OUTCOME=${REASON_CODE}',
          ]
          for marker in markers:
              if marker not in text:
                  failures.append(f'missing:{marker}')
          report = {
              'schema_version': 'crypto_astro_public_http_proof_dispatch_reason_callback_review_v0_1',
              'status': 'PASS' if not failures else 'FAIL',
              'required_reason_codes': required_codes,
              'failures': failures,
          }
          Path('artifacts/preflight-reason-callback-review.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          if failures:
              raise SystemExit(json.dumps(report, sort_keys=True))
          print('PUBLIC_HTTP_PROOF_DISPATCH_REASON_CALLBACK=PASS')
          PY

      - name: Verify deterministic target workflow visibility contract
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          bridge = Path('.github/workflows/crypto-astro-public-http-proof-dispatch.yml').read_text(
              encoding='utf-8'
          )
          target_path = Path('.github/workflows/crypto-astro-public-http-proof.yml')
          target = target_path.read_text(encoding='utf-8')
          trigger_marker = 'workflow_' + 'dispatch:'
          required_bridge_markers = [
              'TARGET_WORKFLOW_PATH: .github/workflows/crypto-astro-public-http-proof.yml',
              'if [ ! -f "$TARGET_WORKFLOW_PATH" ]',
              "marker = 'workflow_' + 'dispatch:'",
              'FAIL_TARGET_WORKFLOW_FILE_MISSING',
              'FAIL_TARGET_WORKFLOW_DISPATCH_TRIGGER_MISSING',
          ]
          failures = [
              f'missing:{marker}'
              for marker in required_bridge_markers
              if marker not in bridge
          ]
          if 'gh workflow view' in bridge:
              failures.append('forbidden:gh_workflow_view')
          if not any(line.strip() == trigger_marker for line in target.splitlines()):
              failures.append('target:workflow_dispatch_missing')
          report = {
              'schema_version': 'crypto_astro_public_http_proof_dispatch_target_visibility_review_v0_1',
              'status': 'PASS' if not failures else 'FAIL',
              'target_workflow_path': str(target_path),
              'deterministic_local_check': True,
              'failures': failures,
          }
          Path('artifacts/target-workflow-visibility-review.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          if failures:
              raise SystemExit(json.dumps(report, sort_keys=True))
          print('PUBLIC_HTTP_PROOF_DISPATCH_TARGET_VISIBILITY=PASS')
          PY

      - name: Re-run exact external public HTTP proof
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python tools/crypto_astro_public_http_proof/verify_public_http_proof.py \
            --repo . \
            --report artifacts/crypto-astro-public-http-proof.json \
            --expected-main-sha "$BASE_SHA" \
            --timeout 20 \
            --attempts 6 \
            --retry-delay 5

      - name: Prove public source and runtime surfaces are unchanged
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          BASE=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          git diff --exit-code "$BASE" "$HEAD_SHA" -- \
            site/crypto-astro/index.html \
            site/crypto-astro/data \
            site/theme/crypto_astro_surface.css \
            site/theme/crypto_astro \
            tools/crypto_astro_static_refresh \
            tools/crypto_astro_snapshot_memory \
            .github/workflows/crypto-astro-public-http-proof.yml

      - name: Upload dispatch review evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-astro-public-http-proof-dispatch-${{ github.event.pull_request.number }}
          path: artifacts/
          if-no-files-found: error
