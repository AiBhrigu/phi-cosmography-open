name: Crypto-Astro PR-04 Retry Transform

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  transform:
    if: github.head_ref == 'feature/crypto-astro-geometry-truth-repair-v0-1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: feature/crypto-astro-geometry-truth-repair-v0-1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m unittest discover -s tools/crypto_astro_css_modules -p "test_*.py" -v
      - run: python3 -m unittest discover -s tools/crypto_astro_geometry_truth -p "test_*.py" -v
      - run: python3 tools/crypto_astro_geometry_truth/apply_geometry_truth_repair.py
      - run: python3 tools/crypto_astro_geometry_truth/apply_visual_sample_truth_repair.py
      - run: python3 tools/crypto_astro_css_modules/build_css_modules.py --write --verify-source-base
      - run: python3 tools/crypto_astro_geometry_truth/verify_geometry_truth.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/crypto-astro/index.html site/theme/crypto_astro/css_order_manifest.json site/theme/crypto_astro_surface.css
          git commit -m "Apply Crypto-Astro geometry truth repair"
          git push origin HEAD:feature/crypto-astro-geometry-truth-repair-v0-1
