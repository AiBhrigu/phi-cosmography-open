name: Crypto-Astro PR-02 Branch Transform

on:
  push:
    branches:
      - feature/crypto-astro-mechanical-inline-css-extraction-v0-1
    paths:
      - "tools/crypto_astro_css_extract/**"
      - ".github/workflows/crypto-astro-pr02-branch-transform.yml"
      - "site/crypto-astro/index.html"
      - "site/theme/crypto_astro_inline_legacy.css"

permissions:
  contents: write

concurrency:
  group: crypto-astro-pr02-branch-transform
  cancel-in-progress: false

jobs:
  transform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: feature/crypto-astro-mechanical-inline-css-extraction-v0-1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run extractor fixtures
        run: |
          python3 -m unittest discover \
            -s tools/crypto_astro_css_extract \
            -p "test_*.py" \
            -v

      - name: Apply exact mechanical extraction
        run: |
          python3 tools/crypto_astro_css_extract/extract_inline_css.py --apply

      - name: Enforce transformed path scope
        run: |
          python3 - <<'PY'
          import subprocess
          allowed = {
              "site/crypto-astro/index.html",
              "site/theme/crypto_astro_inline_legacy.css",
          }
          changed = set(subprocess.check_output(
              ["git", "status", "--porcelain"], text=True
          ).splitlines())
          paths = {row[3:] for row in changed}
          unexpected = sorted(paths - allowed)
          assert not unexpected, f"Unexpected transformed paths: {unexpected}"
          print(f"PR_02_TRANSFORMED_PATHS={sorted(paths)}")
          PY

      - name: Commit transformed surface to feature branch
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "PR_02_TRANSFORM=NOOP"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/crypto-astro/index.html site/theme/crypto_astro_inline_legacy.css
          git commit -m "Crypto-Astro: mechanically extract inline CSS"
          git push origin HEAD:feature/crypto-astro-mechanical-inline-css-extraction-v0-1
