name: Crypto-Astro CSS Modules PR

on:
  pull_request:
    paths:
      - "site/crypto-astro/index.html"
      - "site/theme/crypto_astro_inline_legacy.css"
      - "site/theme/crypto_astro_surface.css"
      - "site/theme/crypto_astro/**"
      - "tools/crypto_astro_css_modules/**"
      - "tools/crypto_astro_surface_truth/**"
      - "tools/crypto_astro_ci/**"
      - ".github/workflows/crypto-astro-css-modules-pr.yml"
      - ".github/workflows/crypto-astro-css-extraction-pr.yml"

permissions:
  contents: read

jobs:
  deterministic-modules:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test legacy applicability classifier
        run: python3 -m unittest discover -s tools/crypto_astro_ci -p "test_*.py" -v

      - name: Classify gate applicability
        id: applicability
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          mkdir -p artifacts
          python3 tools/crypto_astro_ci/classify_legacy_applicability.py \
            --workflow css-modules \
            --head-ref "$HEAD_REF" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --out artifacts/css-modules-applicability.json

      - name: Record explicit non-applicable pass
        if: ${{ steps.applicability.outputs.mode == 'GENERATED_REFRESH' || steps.applicability.outputs.mode == 'NON_APPLICABLE' }}
        run: |
          echo "CSS_MODULES_NOT_APPLICABLE_PASS=${{ steps.applicability.outputs.mode }}"
          echo "Generated refresh remains governed by current refresh and public-surface truth gates."

      - name: Enforce bounded historical PR-03 path scope
        if: ${{ steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY'
          import os, subprocess
          allowed_exact = {
              "site/crypto-astro/index.html",
              "site/theme/crypto_astro_surface.css",
              ".github/workflows/crypto-astro-css-modules-pr.yml",
              ".github/workflows/crypto-astro-css-extraction-pr.yml",
              "tools/crypto_astro_surface_truth/surface_truth.py",
          }
          allowed_prefixes = ("site/theme/crypto_astro/", "tools/crypto_astro_css_modules/")
          changed = subprocess.check_output(
              ["git", "diff", "--name-only", os.environ["BASE_SHA"], os.environ["HEAD_SHA"]], text=True
          ).splitlines()
          unexpected = [p for p in changed if p not in allowed_exact and not p.startswith(allowed_prefixes)]
          assert not unexpected, f"Unexpected historical PR-03 paths: {unexpected}"
          required = {"site/crypto-astro/index.html", "site/theme/crypto_astro_surface.css", "site/theme/crypto_astro/css_order_manifest.json"}
          assert required.issubset(changed), f"Missing historical PR-03 paths: {sorted(required - set(changed))}"
          print("HISTORICAL_PR_03_ALLOWED_PATHS=PASS")
          PY

      - name: Run current CSS module fixtures
        if: ${{ steps.applicability.outputs.mode == 'CURRENT_SURFACE_CHANGE' || steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        run: python3 -m unittest discover -s tools/crypto_astro_css_modules -p "test_*.py" -v

      - name: Verify current source order, hashes and generated bundle
        if: ${{ steps.applicability.outputs.mode == 'CURRENT_SURFACE_CHANGE' || steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        run: python3 tools/crypto_astro_css_modules/build_css_modules.py --verify-source-base > artifacts/css-module-build-report.json

      - name: Verify current runtime stylesheet route
        if: ${{ steps.applicability.outputs.mode == 'CURRENT_SURFACE_CHANGE' || steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          html = Path("site/crypto-astro/index.html").read_text(encoding="utf-8")
          surface = '<link href="../theme/crypto_astro_surface.css" rel="stylesheet"/>'
          legacy = '<link href="../theme/crypto_astro_inline_legacy.css" rel="stylesheet"/>'
          assert html.count(surface) == 1, "Generated surface stylesheet link must appear exactly once"
          assert legacy not in html, "Legacy stylesheet must not load at runtime"
          assert "<style" not in html.lower(), "Inline style block returned"
          print("CURRENT_RUNTIME_STYLESHEET_ROUTE=PASS")
          PY

      - name: Run historical PR-03 base/head parity
        if: ${{ steps.applicability.outputs.mode == 'HISTORICAL_EXACT' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python3 -m pip install --disable-pip-version-check selenium==4.34.2 pillow==11.3.0
          git worktree add --detach /tmp/crypto-astro-pr03-base "$BASE_SHA"
          bash tools/crypto_astro_local_truth/run_local_truth.sh /tmp/crypto-astro-pr03-base artifacts/base 4173
          bash tools/crypto_astro_local_truth/run_local_truth.sh "$GITHUB_WORKSPACE" artifacts/head 4174
          python3 tools/crypto_astro_css_extract/compare_surface_truth.py \
            --base artifacts/base --head artifacts/head --out artifacts/css-module-parity-report.json

      - name: Upload CSS module applicability evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-astro-css-modules-${{ github.event.pull_request.number }}
          path: artifacts/
          if-no-files-found: error
