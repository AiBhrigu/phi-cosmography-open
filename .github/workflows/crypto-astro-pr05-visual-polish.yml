name: Crypto-Astro PR-05 Visual Polish

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  polish:
    if: github.head_ref == 'feature/crypto-astro-editorial-composition-cta-v0-1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: feature/crypto-astro-editorial-composition-cta-v0-1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Repair CTA contrast and compact mobile navigation
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          css_path = Path('site/theme/crypto_astro/extensions/10_editorial_composition.css')
          css = css_path.read_text(encoding='utf-8')
          css = css.replace('var(--phi-gold)', 'var(--phi-gold, #d8ba70)')
          css = css.replace(
              '''.editorial-primary-cta-v0-1 {
            color: #090c12;
            background: linear-gradient(135deg, var(--phi-gold, #d8ba70), #f0d79a);
          }'''.replace('          ', ''),
              '''.editorial-primary-cta-v0-1 {
            color: #090c12;
            background: linear-gradient(135deg, var(--phi-gold, #d8ba70), #f0d79a);
            box-shadow: 0 12px 30px rgba(216, 186, 112, 0.18);
          }'''.replace('          ', ''),
              1,
          )
          css = css.replace(
              '''  .crypto-astro-primary-nav {
            align-items: flex-start;
          }

          .crypto-astro-primary-nav__links {
            justify-content: flex-start;
          }'''.replace('          ', ''),
              '''  .crypto-astro-primary-nav {
            align-items: flex-start;
            flex-direction: column;
          }

          .crypto-astro-primary-nav__links {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            justify-content: stretch;
            width: 100%;
          }'''.replace('          ', ''),
              1,
          )
          css = css.replace(
              '''  .crypto-astro-primary-nav__links,
            .market-first-screen,
            .editorial-astromodule-v0-1__states,
            .proof-moved-grid-v0-1 {
              grid-template-columns: 1fr;
            }

            .crypto-astro-primary-nav__links {
              display: grid;
              width: 100%;
            }

            .crypto-astro-primary-nav__links a {
              padding: 9px 0;
            }'''.replace('            ', ''),
              '''  .market-first-screen,
            .editorial-astromodule-v0-1__states,
            .proof-moved-grid-v0-1 {
              grid-template-columns: 1fr;
            }

            .crypto-astro-primary-nav__links {
              grid-template-columns: repeat(2, minmax(0, 1fr));
              gap: 4px 10px;
            }

            .crypto-astro-primary-nav__links a {
              padding: 7px 4px;
            }

            .crypto-astro-primary-nav__links a:last-child {
              grid-column: 1 / -1;
            }'''.replace('            ', ''),
              1,
          )
          css_path.write_text(css, encoding='utf-8')

          manifest_path = Path('site/theme/crypto_astro/css_order_manifest.json')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          value = css_path.read_bytes()
          found = False
          for entry in manifest['extensions']:
              if entry['path'] == str(css_path):
                  entry['byte_count'] = len(value)
                  entry['sha256'] = hashlib.sha256(value).hexdigest()
                  found = True
          assert found, 'editorial extension manifest entry missing'
          manifest_path.write_text(json.dumps(manifest, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY

      - name: Rebuild and verify deterministic bundle
        run: python3 tools/crypto_astro_css_modules/build_css_modules.py --write --verify-source-base

      - name: Remove worker and commit
        run: |
          rm .github/workflows/crypto-astro-pr05-visual-polish.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/theme/crypto_astro/extensions/10_editorial_composition.css site/theme/crypto_astro/css_order_manifest.json site/theme/crypto_astro_surface.css .github/workflows/crypto-astro-pr05-visual-polish.yml
          git commit -m "Polish PR-05 CTA contrast and mobile navigation"
          git push origin HEAD:feature/crypto-astro-editorial-composition-cta-v0-1
