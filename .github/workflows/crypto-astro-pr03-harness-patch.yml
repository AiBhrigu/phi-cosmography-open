name: Crypto-Astro PR-03 Harness Patch

on:
  pull_request:
    types: [synchronize]
    paths:
      - ".github/workflows/crypto-astro-pr03-harness-patch.yml"

permissions:
  contents: write
  pull-requests: read

jobs:
  patch:
    if: github.head_ref == 'feature/crypto-astro-deterministic-css-modules-v0-1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: feature/crypto-astro-deterministic-css-modules-v0-1

      - name: Make BTC evidence scrolling deterministic
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("tools/crypto_astro_surface_truth/surface_truth.py")
          source = path.read_text(encoding="utf-8")
          helper = '''\n\ndef _scroll_element_to_top(driver: Any, element: Any) -> None:\n    from selenium.webdriver.support.ui import WebDriverWait\n\n    target = driver.execute_script(\n        """\n        const root = document.documentElement;\n        const body = document.body;\n        const rootBehavior = root.style.scrollBehavior;\n        const bodyBehavior = body.style.scrollBehavior;\n        root.style.scrollBehavior = 'auto';\n        body.style.scrollBehavior = 'auto';\n        const target = Math.round(arguments[0].getBoundingClientRect().top + window.scrollY);\n        window.scrollTo(0, target);\n        root.style.scrollBehavior = rootBehavior;\n        body.style.scrollBehavior = bodyBehavior;\n        return target;\n        """,\n        element,\n    )\n    WebDriverWait(driver, 5).until(\n        lambda d: abs(float(d.execute_script("return window.scrollY")) - float(target)) <= 1\n    )\n'''
          if "def _scroll_element_to_top" not in source:
              anchor = "\n\ndef run_browser(url: str, out_dir: Path) -> dict[str, Any]:"
              assert source.count(anchor) == 1
              source = source.replace(anchor, helper + anchor, 1)
          old = 'driver.execute_script("arguments[0].scrollIntoView({block:\'start\'})", btc)'
          replacements = source.count(old)
          if replacements:
              assert replacements == 2
              source = source.replace(old, "_scroll_element_to_top(driver, btc)")
          else:
              assert source.count("_scroll_element_to_top(driver, btc)") == 2
          path.write_text(source, encoding="utf-8")
          PY

      - name: Commit harness repair to feature branch
        run: |
          if git diff --quiet; then
            echo "PR_03_HARNESS_PATCH=NOOP_ALREADY_APPLIED"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/crypto_astro_surface_truth/surface_truth.py
          git commit -m "Crypto-Astro: stabilize BTC evidence scrolling"
          git push origin HEAD:feature/crypto-astro-deterministic-css-modules-v0-1
