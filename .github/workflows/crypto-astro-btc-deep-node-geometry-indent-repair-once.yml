name: Crypto-Astro BTC Deep Node Geometry Indent Repair Once
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/crypto-astro-btc-deep-node-geometry-indent-repair-once.yml"
permissions:
  contents: write
  pull-requests: write
  issues: write
concurrency:
  group: crypto-astro-btc-deep-node-geometry-indent-repair-once
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    env:
      BRANCH: automation/crypto-astro-btc-deep-node-geometry-indent-repair-${{ github.run_id }}
      HTML: site/crypto-astro/index.html
      RUNNER: tools/crypto_astro_static_refresh/crypto_astro_static_refresh_hardened_v0_5.py
      ORIGINAL: .github/workflows/crypto-astro-btc-deep-node-closure-once.yml
      RECOVERY: .github/workflows/crypto-astro-btc-deep-node-recovery-once.yml
      FINAL: .github/workflows/crypto-astro-btc-deep-node-final-worker-once.yml
      ANCHOR: .github/workflows/crypto-astro-btc-deep-node-anchor-repair-once.yml
      SELF: .github/workflows/crypto-astro-btc-deep-node-geometry-indent-repair-once.yml
      HTML_BLOB: 3a7a64f7a953a56596c02310ea9b3aa4afde80fe
      RUNNER_BLOB: 556a364dcda3bd4909c8aa15a00104fd2e574915
      DIAGNOSTIC_PR: "108"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify source anchors
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          test "$(git rev-parse HEAD:$HTML)" = "$HTML_BLOB"
          test "$(git rev-parse HEAD:$RUNNER)" = "$RUNNER_BLOB"
          test -f "$ANCHOR"

      - name: Execute indentation-independent repair
        id: apply
        run: |
          set +e
          {
            python3 - <<'PY'
          from pathlib import Path
          import re, textwrap

          source = Path(".github/workflows/crypto-astro-btc-deep-node-anchor-repair-once.yml").read_text(encoding="utf-8")
          match = re.search(
              r'- name: Apply visual payload and anchor-safe binding.*?python3 - <<\'PY\'\n(.*?)\n          PY',
              source,
              re.S,
          )
          if not match:
              raise SystemExit("anchor-repair Python payload not found")
          script = textwrap.dedent(match.group(1))

          start = script.index("geometry = '''")
          insertion_line = "runner = runner[:eth_start] + geometry + runner[eth_start:]"
          end = script.index(insertion_line, start)
          geometry_lines = [
              "    html = replace_counted(",
              "        html,",
              "        r'(<div class=\"btc-quiet-phi-core-v0-3\" style=\"--btc-dominance:)[^;\"]+(;\">)',",
              "        lambda m: f\"{m.group(1)}{vals['btc_dom']}{m.group(2)}\",",
              "        'btc_hub:gravity_geometry',",
              "        counts,",
              "    )",
              "    for required_binding in ('btc_hub:quiet_gravity', 'btc_hub:gravity_geometry'):",
              "        if counts.get(required_binding) != 1:",
              "            raise RuntimeError(",
              "                f\"BTC deep-node binding mismatch: \"",
              "                f\"{required_binding}={counts.get(required_binding, 0)}\"",
              "            )",
          ]
          geometry_value = "\n".join(geometry_lines) + "\n"
          replacement = "geometry = " + repr(geometry_value) + "\n"
          script = script[:start] + replacement + script[end:]
          compile(script, "<btc-deep-node-indent-repair>", "exec")
          exec(script, {"__name__": "__btc_deep_node_indent_repair__"})
          print("GEOMETRY_INDENT_REPAIR_PASS")
          PY
            python3 -m py_compile "$RUNNER"
            git diff --check
            test "$(git diff --name-only | wc -l | tr -d ' ')" = "2"
            git diff --name-only | grep -Fx "$HTML"
            git diff --name-only | grep -Fx "$RUNNER"
          } > /tmp/btc_geometry_indent.log 2>&1
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          tail -n 180 /tmp/btc_geometry_indent.log
          exit 0

      - name: Publish geometry-indent report
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "### BTC deep-node geometry-indent repair"
            echo
            echo "Exit code: \`${{ steps.apply.outputs.rc }}\`"
            echo '```text'
            tail -n 150 /tmp/btc_geometry_indent.log 2>/dev/null || true
            echo '```'
          } > /tmp/btc_geometry_indent_comment.md
          gh issue comment "$DIAGNOSTIC_PR" --body-file /tmp/btc_geometry_indent_comment.md

      - name: Stop after fail-closed report
        if: steps.apply.outputs.rc != '0'
        run: exit 1

      - name: Open implementation PR and remove temporary workers
        if: steps.apply.outputs.rc == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout -b "$BRANCH"
          git add "$HTML" "$RUNNER"
          git rm "$ORIGINAL" "$RECOVERY" "$FINAL" "$ANCHOR" "$SELF"
          git commit -m "Crypto-Astro: close BTC deep visual and IP node"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "Crypto-Astro: close BTC deep visual and IP node" \
            --body "$(cat <<'BODY'
          One-pass BTC deep-node closure:
          - data-bound BTC dominance geometry
          - direct BTC Field Read remains primary
          - duplicated flow strip and boxed read removed
          - asymmetric Aspect-Cycle relational field
          - protected method vocabulary sealed
          - private depth compressed to Field Map, Cycle Memory, Review Notes
          - fixture-only refresh binding adds btc_hub:gravity_geometry
          - all temporary workers remove themselves

          Scope: HTML + hardened refresh wrapper only. No data/proof refresh, A/E, C/T activation, backend, API, payment, runtime, forecast, trading signal, or ORION exposure.
          BODY
          )"
