name: Crypto-Astro BTC Deep Node Mobile Visual Repair Once
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/crypto-astro-btc-deep-node-geometry-indent-repair-once.yml"
permissions:
  contents: write
  pull-requests: write
  issues: write
concurrency:
  group: crypto-astro-btc-deep-node-mobile-visual-repair-once
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: automation/crypto-astro-btc-deep-node-geometry-indent-repair-29705234961
      EXPECTED_HEAD: 22211ad6da9d438eca0c68ca18805811f468eb61
      TARGET_FILE: site/crypto-astro/index.html
      TARGET_PR: "113"
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify implementation head
        run: |
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          grep -F "BTC_DEEP_NODE_VISUAL_IP_CLOSURE_v0_1:BEGIN" "$TARGET_FILE"
          test "$(grep -Foc 'href=\"https://www.bhrigu.io/crypto-astro/btc\"' "$TARGET_FILE")" = "1"

      - name: Apply mobile core compatibility override
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("site/crypto-astro/index.html")
          text = path.read_text(encoding="utf-8")
          marker = "/* BTC_DEEP_NODE_MOBILE_CORE_COMPAT_v0_1:BEGIN */"
          if marker in text:
              raise SystemExit("mobile compatibility marker already present")
          anchor = "/* BTC_DEEP_NODE_VISUAL_IP_CLOSURE_v0_1:END */"
          if text.count(anchor) != 1:
              raise SystemExit(f"deep-node CSS end anchor mismatch: {text.count(anchor)}")
          css = r'''
          /* BTC_DEEP_NODE_MOBILE_CORE_COMPAT_v0_1:BEGIN */
          @media (max-width:980px) {
            .btc-deep-v1 .btc-quiet-phi-core-v0-3 {
              position:absolute!important;
              z-index:5!important;
              left:50%!important;
              right:auto!important;
              top:50%!important;
              bottom:auto!important;
              width:clamp(8.5rem,16vw,11rem)!important;
              height:auto!important;
              max-width:none!important;
              aspect-ratio:1!important;
              transform:translate(-50%,-50%)!important;
              border-radius:50%!important;
              padding:0!important;
              text-align:center!important;
              display:grid!important;
              place-items:center!important;
              align-content:center!important;
            }
          }
          @media (max-width:620px) {
            .btc-deep-v1 .btc-quiet-phi-core-v0-3 {
              width:8.3rem!important;
            }
          }
          /* BTC_DEEP_NODE_MOBILE_CORE_COMPAT_v0_1:END */
          '''
          text = text.replace(anchor, css + "\n" + anchor, 1)
          path.write_text(text, encoding="utf-8")
          PY
          git diff --check
          test "$(git diff --name-only)" = "$TARGET_FILE"
          grep -F "BTC_DEEP_NODE_MOBILE_CORE_COMPAT_v0_1:BEGIN" "$TARGET_FILE"

      - name: Commit mobile visual repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$TARGET_FILE"
          git commit -m "Crypto-Astro: repair BTC mobile core geometry"
          git push origin HEAD:"$TARGET_BRANCH"

      - name: Report repair to implementation PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "$TARGET_PR" --body "Mobile visual review repair applied: legacy responsive \\`!important\\` positioning is now overridden only inside the new BTC deep node. Desktop geometry, data bindings, CTA route, and protected boundaries are unchanged. CI and expanded visual evidence must pass before merge."
