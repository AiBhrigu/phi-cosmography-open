name: Crypto-Astro PR-07 Bootstrap

on:
  push:
    branches:
      - agent/crypto-astro-pr07-what-changed-ui
  workflow_dispatch:

permissions:
  contents: write

jobs:
  implement:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: agent/crypto-astro-pr07-what-changed-ui
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact base
        run: test "$(git rev-parse HEAD^)" = "6451f9616e3f9d4c14ff8e79d97257d7e1037119"
      - name: Generate bounded PR-07 implementation
        run: |
          mkdir -p tools/crypto_astro_what_changed
          python - <<'PY'
          from pathlib import Path
          import json, re, html
          repo=Path('.')
          delta=json.loads((repo/'site/crypto-astro/data/crypto_astro_snapshot_delta.public.json').read_text())
          registry=json.loads((repo/'site/crypto-astro/data/crypto_astro_snapshot_registry.public.json').read_text())
          assert delta['schema_version']=='crypto_astro_snapshot_delta_public_v0_1'
          assert delta['comparison_status']=='PARTIAL_COMPARABLE'
          assert registry['schema_version']=='crypto_astro_snapshot_registry_public_v0_1'
          assert registry['selection_policy']=='EXPLICIT_ACCEPTED_PAIR'
          metrics=[
            ('btc_gravity_pct','BTC gravity'),('stablecoin_share_pct','Stablecoin share'),
            ('alt_breadth_24h_pct','Alt breadth · 24h'),('alt_breadth_7d_pct','Alt breadth · 7d'),
            ('market_field_score','Market Field Score'),('regime_label','Regime')]
          unit={'percentage_points':'percentage points','score_points':'points'}
          cards=[]
          for key,label in metrics:
            m=delta['metrics'][key]; assert m['status']=='COMPARABLE'
            if m['type']=='CATEGORICAL': d=m['transition'].title(); direction='unchanged'
            else: d=f"{m['display_delta']} {unit[m['delta_unit']]}"; direction=m['direction'].lower()
            cards.append(f'''      <article class="what-changed-metric-v0-1" data-metric="{key}" data-direction="{direction}">
        <span>{label}</span>
        <strong>{html.escape(str(d))}</strong>
        <small>{html.escape(str(m['previous_value']))} → {html.escape(str(m['current_value']))}</small>
      </article>''')
          u=delta['unavailable_metrics']; assert u['defi_tvl_usd']['delta_value'] is None; assert u['liquidity_context_state']['delta_value'] is None
          current=delta['current_snapshot_id'].split(':')[1]; previous=delta['previous_snapshot_id'].split(':')[1]
          block=f'''<section id="what-changed" class="editorial-what-changed-v0-1 editorial-chapter-v0-1 what-changed-memory-v0-1" data-editorial-chapter="what-changed" data-what-changed-status="partial-comparable" aria-labelledby="what-changed-title">
  <div class="what-changed-memory-v0-1__head">
    <div><p class="eyebrow">What Changed</p><h2 id="what-changed-title">Verified change memory</h2><p>Current and previous accepted snapshots are compared only where source, methodology, universe, and proof bindings remain compatible.</p></div>
    <dl class="what-changed-memory-v0-1__snapshots" aria-label="Compared snapshot timestamps"><div><dt>Current</dt><dd>{current}</dd></div><div><dt>Previous</dt><dd>{previous}</dd></div></dl>
  </div>
  <div class="what-changed-memory-v0-1__grid" aria-label="Verified comparable changes">
{chr(10).join(cards)}
  </div>
  <div class="what-changed-memory-v0-1__unavailable" role="note" aria-label="Unavailable comparisons"><strong>Methodology boundary preserved</strong><span>DeFi TVL · unavailable ({u['defi_tvl_usd']['reason_code']})</span><span>Liquidity context · unavailable ({u['liquidity_context_state']['reason_code']})</span></div>
  <p class="what-changed-memory-v0-1__meta">Static accepted-pair comparison · generated {delta['generated_at_utc']}. No relative percentages, cached reconstruction, live feed, forecast, or trading signal.</p>
</section>'''
          p=repo/'site/crypto-astro/index.html'; s=p.read_text(); pat=re.compile(r'<section id="what-changed".*?</section>\n(?=<!-- BTC_PHI_CYCLE_HUB_SURFACE_LIFT_v0_1:BEGIN -->)',re.S); s,n=pat.subn(block+'\n',s); assert n==1
          link='<link href="../theme/crypto_astro_what_changed.css" rel="stylesheet"/>'; anchor='<link href="../theme/crypto_astro_surface.css" rel="stylesheet"/>'
          if link not in s: assert s.count(anchor)==1; s=s.replace(anchor,anchor+'\n'+link)
          p.write_text(s)
          PY
          cat > site/theme/crypto_astro_what_changed.css <<'CSS'
          .what-changed-memory-v0-1{display:grid;gap:24px;padding:clamp(24px,4vw,52px);border:1px solid rgba(153,194,222,.18);border-radius:28px;background:linear-gradient(145deg,rgba(11,25,40,.94),rgba(8,15,27,.98))}.what-changed-memory-v0-1__head{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(260px,.65fr);gap:24px;align-items:end}.what-changed-memory-v0-1__snapshots{display:grid;gap:8px;margin:0;padding:14px;border:1px solid rgba(151,191,217,.14);border-radius:18px}.what-changed-memory-v0-1__snapshots div{display:grid;grid-template-columns:76px 1fr;gap:12px}.what-changed-memory-v0-1__snapshots dt{font-size:.72rem;text-transform:uppercase;color:var(--muted,#9aa8b5)}.what-changed-memory-v0-1__snapshots dd{margin:0;font:600 .82rem/1.35 ui-monospace,monospace;overflow-wrap:anywhere}.what-changed-memory-v0-1__grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.what-changed-metric-v0-1{min-height:138px;display:flex;flex-direction:column;justify-content:space-between;gap:12px;padding:18px;border:1px solid rgba(151,191,217,.12);border-radius:19px;background:rgba(255,255,255,.025)}.what-changed-metric-v0-1 span{font-size:.76rem;text-transform:uppercase;color:var(--muted,#9aa8b5)}.what-changed-metric-v0-1 strong{font-size:clamp(1.15rem,2vw,1.55rem)}.what-changed-metric-v0-1 small,.what-changed-memory-v0-1__unavailable span,.what-changed-memory-v0-1__meta{color:var(--muted,#9aa8b5)}.what-changed-metric-v0-1[data-direction="up"] strong{color:#d9bc78}.what-changed-metric-v0-1[data-direction="down"] strong{color:#9eb9ca}.what-changed-memory-v0-1__unavailable{display:flex;flex-wrap:wrap;gap:10px 18px;padding:14px 16px;border-left:2px solid rgba(217,188,120,.5);background:rgba(217,188,120,.045)}@media(max-width:850px){.what-changed-memory-v0-1__head{grid-template-columns:1fr}.what-changed-memory-v0-1__grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:560px){.what-changed-memory-v0-1__grid{grid-template-columns:1fr}}
          CSS
          cat > tools/crypto_astro_what_changed/verify_what_changed.py <<'PY'
          import json,re,hashlib
          from pathlib import Path
          p=Path('site/crypto-astro/index.html'); s=p.read_text(); failures=[]
          expected={'btc_gravity_pct':'+0.28 percentage points','stablecoin_share_pct':'-0.18 percentage points','alt_breadth_24h_pct':'+8.0 percentage points','alt_breadth_7d_pct':'-1.3 percentage points','market_field_score':'+1.0 points','regime_label':'Unchanged'}
          for k,v in expected.items():
            if s.count(f'data-metric="{k}"')!=1 or s.count(v)!=1: failures.append(k)
          for c in ('METHODOLOGY_MISMATCH','DEPENDENCY_METHODOLOGY_MISMATCH'):
            if s.count(c)!=1: failures.append(c)
          if s.count('href="https://www.bhrigu.io/crypto-astro/btc"')!=2: failures.append('btc_cta')
          if s.count('style="--btc-dominance:56.5%;"')!=1: failures.append('btc_geometry')
          print(json.dumps({'status':'PASS' if not failures else 'FAIL','failures':failures,'html_sha256':hashlib.sha256(p.read_bytes()).hexdigest()},indent=2)); raise SystemExit(bool(failures))
          PY
          cp tools/crypto_astro_what_changed/verify_what_changed.py tools/crypto_astro_what_changed/render_what_changed.py
          cat > tools/crypto_astro_what_changed/test_what_changed.py <<'PY'
          import unittest
          from pathlib import Path
          class T(unittest.TestCase):
            def test_contract(self):
              s=Path('site/crypto-astro/index.html').read_text(); self.assertEqual(s.count('data-metric='),6); self.assertEqual(s.count('unavailable ('),2)
          PY
          cat > .github/workflows/crypto-astro-what-changed-pr.yml <<'YAML'
          name: Crypto-Astro What Changed PR
          on:
            pull_request:
              paths: ['site/crypto-astro/index.html','site/theme/crypto_astro_what_changed.css','tools/crypto_astro_what_changed/**','.github/workflows/crypto-astro-what-changed-pr.yml']
          permissions: {contents: read}
          jobs:
            contract:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v5
                - uses: actions/setup-python@v5
                  with: {python-version: '3.11'}
                - run: python -m unittest discover -s tools/crypto_astro_what_changed -p 'test_*.py' -v
                - run: python tools/crypto_astro_what_changed/verify_what_changed.py
          YAML
          python -m unittest discover -s tools/crypto_astro_what_changed -p 'test_*.py' -v
          python tools/crypto_astro_what_changed/verify_what_changed.py
          rm .github/workflows/crypto-astro-pr07-bootstrap.yml
      - name: Commit implementation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Crypto-Astro PR-07: bind verified change memory to UI'
          git push origin HEAD:agent/crypto-astro-pr07-what-changed-ui
