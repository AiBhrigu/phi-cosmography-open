name: Crypto-Astro PR-07 Trusted Launcher

on:
  pull_request_target:
    types: [edited]

permissions:
  contents: write
  pull-requests: write

jobs:
  launch:
    if: >-
      github.event.pull_request.number == 136 &&
      github.event.pull_request.head.ref == 'agent/crypto-astro-pr07-what-changed-ui' &&
      contains(github.event.pull_request.body, 'PR07_TRANSPORT_TOKEN=RUN_V1')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out trusted control payload
        uses: actions/checkout@v5
        with:
          ref: main
          path: control
          fetch-depth: 1

      - name: Check out bounded PR branch
        uses: actions/checkout@v5
        with:
          ref: agent/crypto-astro-pr07-what-changed-ui
          path: work
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract trusted transport steps
        run: |
          python -m pip install --disable-pip-version-check pyyaml==6.0.2
          python - <<'PY'
          from pathlib import Path
          import yaml

          payload = yaml.safe_load(Path('control/.github/workflows/crypto-astro-pr07-transport.yml').read_text(encoding='utf-8'))
          steps = payload['jobs']['repair']['steps']
          runs = [step['run'] for step in steps if 'run' in step]
          if len(runs) != 3:
              raise SystemExit(f'unexpected trusted run-step count: {len(runs)}')
          for index, script in enumerate(runs):
              path = Path(f'/tmp/pr07-trusted-step-{index}.sh')
              path.write_text('#!/usr/bin/env bash\n' + script + '\n', encoding='utf-8')
              path.chmod(0o700)
          PY

      - name: Execute trusted transport payload
        working-directory: work
        run: |
          set -euo pipefail
          /tmp/pr07-trusted-step-0.sh
          /tmp/pr07-trusted-step-1.sh
          /tmp/pr07-trusted-step-2.sh
