name: Crypto-Astro PR-07 Trusted Launcher

on:
  pull_request_target:
    types: [synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  launch:
    if: >-
      github.event.pull_request.number == 136 &&
      github.event.pull_request.head.ref == 'agent/crypto-astro-pr07-what-changed-ui' &&
      contains(github.event.pull_request.body, 'PR07_TRANSPORT_TOKEN=RUN_V1')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out bounded PR branch
        uses: actions/checkout@v5
        with:
          ref: agent/crypto-astro-pr07-what-changed-ui
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Render and validate exact PR-07 implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/crypto-astro-pr07-bootstrap.yml \
            .github/workflows/crypto-astro-pr07-pr-worker.yml
          rm -rf artifacts

          python tools/crypto_astro_what_changed/render_what_changed.py --repo .
          python -m unittest discover -s tools/crypto_astro_what_changed -p 'test_*.py' -v
          python tools/crypto_astro_what_changed/verify_what_changed.py \
            --repo . \
            --report /tmp/what-changed-verification.json

          git fetch origin main
          BASE=$(git merge-base origin/main HEAD)
          python - "$BASE" <<'PY'
          import subprocess, sys
          base = sys.argv[1]
          allowed = {
              '.github/workflows/crypto-astro-what-changed-pr.yml',
              'site/crypto-astro/index.html',
              'site/theme/crypto_astro_what_changed.css',
              'tools/crypto_astro_what_changed/render_what_changed.py',
              'tools/crypto_astro_what_changed/verify_what_changed.py',
              'tools/crypto_astro_what_changed/test_what_changed.py',
          }
          changed = set(subprocess.check_output(
              ['git', 'diff', '--name-only', base], text=True
          ).splitlines())
          assert changed == allowed, {
              'missing': sorted(allowed - changed),
              'unexpected': sorted(changed - allowed),
          }
          print('PR_07_FINAL_EXACT_SCOPE=PASS')
          PY

          test "$(git hash-object site/crypto-astro/data/crypto_astro_snapshot_registry.public.json)" = \
            "7af2b3a9932af84aa654453663ba2b4b24ef4070"
          test "$(git hash-object site/crypto-astro/data/crypto_astro_snapshot_delta.public.json)" = \
            "172af6dfc1c512df4d289ac1f25f6a76a01c82f5"
          git diff --exit-code "$BASE" -- \
            site/crypto-astro/data/crypto_astro_snapshot.public.json \
            site/crypto-astro/data/crypto_astro_snapshot_proof.public.json \
            site/crypto-astro/data/crypto_astro_module_bindings.public.json \
            tools/crypto_astro_static_refresh

      - name: Commit generated HTML and bootstrap removal
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo 'PR_07_BRANCH_ALREADY_RENDERED=YES'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Crypto-Astro PR-07: render verified What Changed memory'
          git push origin HEAD:agent/crypto-astro-pr07-what-changed-ui
