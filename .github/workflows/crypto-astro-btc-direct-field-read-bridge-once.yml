name: Crypto-Astro BTC Direct Field Read Bridge Once

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/crypto-astro-btc-direct-field-read-bridge-once.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: crypto-astro-btc-direct-field-read-bridge-once
  cancel-in-progress: false

jobs:
  bridge:
    name: Build direct BTC Field Read bridge and open review PR
    runs-on: ubuntu-latest
    env:
      BRIDGE_BRANCH: automation/crypto-astro-btc-direct-field-read-bridge-${{ github.run_id }}
      TARGET_FILE: site/crypto-astro/index.html
      BOOTSTRAP_WORKFLOW: .github/workflows/crypto-astro-btc-direct-field-read-bridge-once.yml
      BTC_FIELD_READ_URL: https://www.bhrigu.io/crypto-astro/btc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify live BTC question corridor
        run: |
          curl --fail --silent --show-error --location --retry 3 --max-time 40 "$BTC_FIELD_READ_URL" > /tmp/btc-field-read.html
          grep -F "Ask one BTC field question" /tmp/btc-field-read.html

      - name: Apply fail-closed direct bridge patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("site/crypto-astro/index.html")
          text = path.read_text(encoding="utf-8")

          marker = "CRYPTO_ASTRO_BTC_GRAVITY_DIRECT_FIELD_READ_BRIDGE_v0_1"
          if marker in text:
              raise SystemExit("bridge marker already present")

          css_anchor = "/* CRYPTO_ASTRO_PHI_GATEWAY_FIELD_VISIBILITY_MICROPATCH_v0_1:BEGIN */"
          if text.count(css_anchor) != 1:
              raise SystemExit(f"CSS anchor count mismatch: {text.count(css_anchor)}")

          css = r'''/* CRYPTO_ASTRO_BTC_GRAVITY_DIRECT_FIELD_READ_BRIDGE_v0_1:BEGIN */
          .btc-field-read-entry-v0-1 {
            position: relative;
            isolation: isolate;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 0.8rem;
            align-items: center;
            margin: 1rem 0 1.15rem;
            padding: 0.82rem 0.95rem;
            border-top: 1px solid rgba(245,199,106,0.22);
            border-bottom: 1px solid rgba(91,157,255,0.18);
            color: rgba(240,245,255,0.94);
            text-decoration: none;
            background:
              radial-gradient(circle at 8% 50%, rgba(245,199,106,0.12), transparent 24%),
              linear-gradient(90deg, rgba(245,199,106,0.025), rgba(91,157,255,0.055), rgba(245,199,106,0.025));
            overflow: hidden;
          }
          .btc-field-read-entry-v0-1::after {
            content: "";
            position: absolute;
            z-index: -1;
            left: 3.1rem;
            right: 1rem;
            top: 50%;
            height: 1px;
            transform: translateY(-50%);
            background: linear-gradient(90deg, rgba(245,199,106,0.42), rgba(91,157,255,0.22), transparent);
            opacity: 0.7;
          }
          .btc-field-read-entry-glyph-v0-1 {
            width: 2.35rem;
            height: 2.35rem;
            display: grid;
            place-items: center;
            border: 1px solid rgba(245,199,106,0.42);
            border-radius: 50%;
            color: rgba(245,199,106,0.96);
            background: rgba(6,10,23,0.78);
            box-shadow: 0 0 28px rgba(245,199,106,0.14);
            font-family: Georgia, serif;
            font-size: 1.15rem;
          }
          .btc-field-read-entry-v0-1 strong {
            position: relative;
            z-index: 1;
            justify-self: start;
            padding-right: 0.45rem;
            color: rgba(245,199,106,0.96);
            background: rgba(7,12,28,0.88);
            font-size: 0.86rem;
            letter-spacing: 0.11em;
            text-transform: uppercase;
          }
          .btc-field-read-entry-v0-1 em {
            position: relative;
            z-index: 1;
            padding-left: 0.45rem;
            color: rgba(226,233,255,0.74);
            background: rgba(7,12,28,0.88);
            font-size: 0.78rem;
            font-style: normal;
            letter-spacing: 0.04em;
          }
          .btc-field-read-entry-v0-1:hover,
          .btc-field-read-entry-v0-1:focus-visible {
            border-top-color: rgba(245,199,106,0.48);
            border-bottom-color: rgba(91,157,255,0.38);
            filter: brightness(1.08);
          }
          .btc-field-read-entry-v0-1:focus-visible {
            outline: 2px solid rgba(245,199,106,0.72);
            outline-offset: 4px;
          }
          @media (max-width: 720px) {
            .btc-field-read-entry-v0-1 {
              grid-template-columns: auto minmax(0,1fr);
              gap: 0.6rem 0.75rem;
              padding: 0.78rem 0.82rem;
            }
            .btc-field-read-entry-v0-1::after { left: 3rem; right: 0.75rem; }
            .btc-field-read-entry-v0-1 strong { padding-right: 0; }
            .btc-field-read-entry-v0-1 em {
              grid-column: 2;
              justify-self: start;
              padding-left: 0;
              background: transparent;
            }
          }
          /* CRYPTO_ASTRO_BTC_GRAVITY_DIRECT_FIELD_READ_BRIDGE_v0_1:END */
          '''
          text = text.replace(css_anchor, css + "\n" + css_anchor, 1)

          pattern = re.compile(
              r'(?P<indent>^[ \t]*)<div class="btc-phi-cycle-read-strip-v0-3" aria-label="BTC Phi Cycle compact analytic read">\s*'
              r'<span>Market gravity</span>\s*'
              r'<span>Aspect pressure</span>\s*'
              r'<span>Timing corridor</span>\s*'
              r'<span>Operator review</span>\s*'
              r'</div>',
              re.MULTILINE,
          )
          matches = list(pattern.finditer(text))
          if len(matches) != 1:
              raise SystemExit(f"HTML anchor count mismatch: {len(matches)}")

          match = matches[0]
          indent = match.group("indent")
          direct_bridge = (
              match.group(0)
              + "\n"
              + indent
              + "<!-- CRYPTO_ASTRO_BTC_GRAVITY_DIRECT_FIELD_READ_BRIDGE_v0_1:BEGIN -->\n"
              + indent
              + '<a class="btc-field-read-entry-v0-1" href="https://www.bhrigu.io/crypto-astro/btc" aria-label="Enter BTC Field Read and ask one BTC field question">\n'
              + indent
              + '  <span class="btc-field-read-entry-glyph-v0-1" aria-hidden="true">Φ</span>\n'
              + indent
              + '  <strong>Enter BTC Field Read</strong>\n'
              + indent
              + '  <em>Ask one BTC field question</em>\n'
              + indent
              + '</a>\n'
              + indent
              + "<!-- CRYPTO_ASTRO_BTC_GRAVITY_DIRECT_FIELD_READ_BRIDGE_v0_1:END -->"
          )
          text = text[:match.start()] + direct_bridge + text[match.end():]

          required = [
              "https://www.bhrigu.io/crypto-astro/btc",
              "Enter BTC Field Read",
              "Ask one BTC field question",
              "CRYPTO_ASTRO_BTC_GRAVITY_DIRECT_FIELD_READ_BRIDGE_v0_1:BEGIN",
              "CRYPTO_ASTRO_BTC_GRAVITY_DIRECT_FIELD_READ_BRIDGE_v0_1:END",
          ]
          for token in required:
              if token not in text:
                  raise SystemExit(f"required token missing: {token}")

          if text.count("https://www.bhrigu.io/crypto-astro/btc") != 1:
              raise SystemExit("direct BTC URL count must equal 1")

          path.write_text(text, encoding="utf-8")
          PY

      - name: Validate bounded diff
        run: |
          git diff --check
          test "$(git diff --name-only | wc -l | tr -d ' ')" = "1"
          test "$(git diff --name-only)" = "$TARGET_FILE"
          grep -F "https://www.bhrigu.io/crypto-astro/btc" "$TARGET_FILE"
          grep -F "Ask one BTC field question" "$TARGET_FILE"
          if git diff -- "$TARGET_FILE" | grep -E '^[-+].*(A/E|C/T Temporal|Semenko phase scoring|DeFi TVL|payment|backend)' ; then
            echo "Forbidden scope drift detected."
            exit 1
          fi

      - name: Create review branch and remove bootstrap workflow
        run: |
          git checkout -b "$BRIDGE_BRANCH"
          git add "$TARGET_FILE"
          git rm "$BOOTSTRAP_WORKFLOW"
          git commit -m "Crypto-Astro: add direct BTC Field Read bridge"
          git push -u origin "$BRIDGE_BRANCH"

      - name: Create review PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/btc_bridge_pr_body.md <<'BODY'
          Adds one direct, public-safe route from `BTC gravity · cycle context` to the live BTC question corridor.

          Public route:
          - BTC Gravity surface
          - `Enter BTC Field Read`
          - `Ask one BTC field question`
          - `https://www.bhrigu.io/crypto-astro/btc`

          Visual rule:
          - one Φ glyph
          - one light corridor
          - one short entry line
          - no banner and no dashboard card

          Verification:
          - live target contains `Ask one BTC field question`
          - exact target URL appears once on the showcase
          - changed production file is limited to `site/crypto-astro/index.html`
          - bootstrap workflow deletes itself in this PR
          - `git diff --check` passes

          Boundary:
          - no market data changes
          - no proof changes
          - no A/E activation
          - no C/T activation
          - no runtime, backend, payment, API, or ORION-core changes
          - no method disclosure
          - no trading signal, forecast, or price target

          Review gate:
          - PR only
          - no auto-merge
          BODY
          gh pr create \
            --base main \
            --head "$BRIDGE_BRANCH" \
            --title "Crypto-Astro: add direct BTC Field Read bridge" \
            --body-file /tmp/btc_bridge_pr_body.md
