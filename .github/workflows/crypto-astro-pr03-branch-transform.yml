name: Crypto-Astro PR-03 Branch Transform

on:
  pull_request:
    types: [opened]
    paths:
      - ".github/workflows/crypto-astro-pr03-branch-transform.yml"
      - "tools/crypto_astro_css_modules/**"

permissions:
  contents: write
  pull-requests: read

jobs:
  transform:
    if: github.head_ref == 'feature/crypto-astro-deterministic-css-modules-v0-1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: feature/crypto-astro-deterministic-css-modules-v0-1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Materialize exact source modules and manifest
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import re
          import subprocess
          from pathlib import Path

          source_base = "2b84a9c40ae692abaca0b0e96c1159027a26ac2b"
          source_html = "site/crypto-astro/index.html"
          html = subprocess.check_output(
              ["git", "show", f"{source_base}:{source_html}"]
          )
          blocks = re.findall(rb"<style(?:\s[^>]*)?>(.*?)</style>", html, re.I | re.S)
          specs = [
              ("01_surface_market_btc.css", "surface_market_btc"),
              ("02_astromodule_core.css", "astromodule_core"),
              ("03_support_modules.css", "support_modules"),
              ("04_astromodule_balance.css", "astromodule_balance"),
              ("05_field_synthesis.css", "field_synthesis"),
              ("06_public_samples.css", "public_samples"),
              ("07_public_samples_visual.css", "public_samples_visual"),
              ("08_proof_access_tail.css", "proof_access_tail"),
          ]
          assert len(blocks) == len(specs), f"Expected {len(specs)} source blocks, found {len(blocks)}"

          module_dir = Path("site/theme/crypto_astro/modules")
          module_dir.mkdir(parents=True, exist_ok=True)
          entries = []
          for index, (block, (filename, role)) in enumerate(zip(blocks, specs), 1):
              path = module_dir / filename
              path.write_bytes(block)
              entries.append({
                  "order": index,
                  "role": role,
                  "source_style_block_index": index,
                  "path": path.as_posix(),
                  "byte_count": len(block),
                  "sha256": hashlib.sha256(block).hexdigest(),
              })

          manifest = {
              "schema_version": "crypto_astro_css_order_manifest_v0_1",
              "source_base_sha": source_base,
              "source_html_path": source_html,
              "legacy_source_path": "site/theme/crypto_astro_inline_legacy.css",
              "generated_bundle_path": "site/theme/crypto_astro_surface.css",
              "join_rule": "append one LF only when a source module has no terminal CR or LF",
              "modules": entries,
          }
          manifest_path = Path("site/theme/crypto_astro/css_order_manifest.json")
          manifest_path.parent.mkdir(parents=True, exist_ok=True)
          manifest_path.write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Build and verify exact runtime bundle
        run: |
          python3 tools/crypto_astro_css_modules/build_css_modules.py \
            --write \
            --verify-source-base

      - name: Replace legacy runtime link only
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("site/crypto-astro/index.html")
          html = path.read_text(encoding="utf-8")
          old = '<link href="../theme/crypto_astro_inline_legacy.css" rel="stylesheet"/>'
          new = '<link href="../theme/crypto_astro_surface.css" rel="stylesheet"/>'
          assert html.count(old) == 1, "Expected exactly one legacy stylesheet link"
          assert new not in html, "Generated surface stylesheet link already exists"
          path.write_text(html.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Verify transform scope
        run: |
          python3 - <<'PY'
          import subprocess

          rows = subprocess.check_output(["git", "status", "--porcelain"], text=True).splitlines()
          paths = {row[3:] for row in rows}
          allowed_exact = {
              "site/crypto-astro/index.html",
              "site/theme/crypto_astro_surface.css",
              "site/theme/crypto_astro/css_order_manifest.json",
          }
          allowed_prefix = "site/theme/crypto_astro/modules/"
          unexpected = sorted(path for path in paths if path not in allowed_exact and not path.startswith(allowed_prefix))
          assert not unexpected, f"Unexpected PR-03 transform paths: {unexpected}"
          print(f"PR_03_TRANSFORM_PATHS={sorted(paths)}")
          PY

      - name: Commit transform to feature branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            site/crypto-astro/index.html \
            site/theme/crypto_astro_surface.css \
            site/theme/crypto_astro/css_order_manifest.json \
            site/theme/crypto_astro/modules/
          git commit -m "Crypto-Astro: build deterministic CSS modules"
          git push origin HEAD:feature/crypto-astro-deterministic-css-modules-v0-1
