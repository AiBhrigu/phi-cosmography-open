name: Crypto-Astro Static Refresh PR Visual

on:
  pull_request:
    paths:
      - "site/crypto-astro/**"
      - "site/theme/phi_theme.css"
      - "tools/crypto_astro_static_refresh/**"
      - ".github/workflows/crypto-astro-static-refresh-pr-visual.yml"

permissions:
  contents: read

jobs:
  visual:
    name: Render desktop and mobile evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify DeFi TVL methodology contract
        run: python3 tools/crypto_astro_static_refresh/test_defi_tvl_methodology_v0_1.py

      - name: Install browser driver
        run: python3 -m pip install --disable-pip-version-check selenium==4.34.2 pillow==11.3.0

      - name: Start static preview
        run: |
          python3 -m http.server 4173 --directory site >/tmp/crypto-astro-preview.log 2>&1 &
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4173/crypto-astro/index.html >/dev/null; then
              exit 0
            fi
            sleep 0.5
          done
          cat /tmp/crypto-astro-preview.log
          exit 1

      - name: Render and verify snapshot bindings
        run: |
          mkdir -p artifacts
          python3 - <<'PY'
          import json
          import time
          from pathlib import Path
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait

          snapshot = json.loads(Path("site/crypto-astro/data/crypto_astro_snapshot.public.json").read_text())
          generated = snapshot["generated_at_utc"]
          field_score = str(round(float(snapshot["field_output"]["market_field_score"])))
          assets = snapshot["public_samples"]["assets"]
          expected_ton = f'{float(assets["TON"]["score"]):.2f}'
          expected_icp = f'{float(assets["ICP"]["score"]):.2f}'
          expected_coverage = f'{len(assets)} assets · 3 displayed'

          options = webdriver.ChromeOptions()
          options.add_argument("--headless=new")
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")
          options.add_argument("--hide-scrollbars")
          options.set_capability("goog:loggingPrefs", {"browser": "ALL"})

          driver = webdriver.Chrome(options=options)
          report = {
              "generated_at_utc": generated,
              "viewports": {},
              "assertions": {},
              "checks": {},
              "failures": [],
          }
          try:
              driver.set_window_size(1440, 1000)
              driver.get("http://127.0.0.1:4173/crypto-astro/index.html")
              WebDriverWait(driver, 20).until(
                  lambda d: d.find_element(By.CSS_SELECTOR, ".score-orb.field-gauge").text.strip()
              )

              orb = driver.find_element(By.CSS_SELECTOR, ".score-orb.field-gauge")
              btc_hub = driver.find_element(By.CSS_SELECTOR, "#btc-phi-cycle-hub").text
              btc_hub_lower = btc_hub.lower()
              sample_panel = driver.find_element(
                  By.CSS_SELECTOR, '[aria-label="Crypto-Astro Public Sample Web Panel"]'
              ).text
              scoring = driver.find_element(By.CSS_SELECTOR, "#scoring").text
              deep_node_present = bool(driver.find_elements(By.CSS_SELECTOR, ".btc-deep-v1"))

              checks = {
                  "field_score_text": orb.text.strip() == field_score,
                  "field_score_aria": orb.get_attribute("aria-label") == f"Market Field Score {field_score} out of 100",
                  "btc_timestamp": generated in btc_hub,
                  "ton_score": expected_ton in sample_panel,
                  "icp_score": expected_icp in sample_panel,
                  "scoring_coverage": expected_coverage in scoring,
                  "heartbeat": "static · no schedule" in scoring,
              }
              if deep_node_present:
                  checks.update({
                      "aspect_pressure": "aspect pressure" in btc_hub_lower,
                      "phase_condition": "phase condition" in btc_hub_lower,
                      "event_memory": "event memory" in btc_hub_lower,
                      "private_research_depth": "private research depth" in btc_hub_lower,
                  })

              report["checks"] = checks
              report["assertions"].update({
                  "field_score": orb.text.strip(),
                  "field_score_aria": orb.get_attribute("aria-label"),
                  "btc_timestamp": generated,
                  "btc_deep_node": "present" if deep_node_present else "not_in_scope",
                  "aspect_cycle_core": "present" if deep_node_present else "not_in_scope",
                  "private_research_depth": "present" if deep_node_present else "not_in_scope",
                  "ton_score": expected_ton,
                  "icp_score": expected_icp,
                  "scoring_coverage": expected_coverage,
                  "heartbeat": "static · no schedule",
              })

              targets = {"btc-hub": "#btc-phi-cycle-hub"}
              if deep_node_present:
                  targets.update({
                      "aspect-cycle": "#aspect-cycle-v1",
                      "private-depth": ".btc-private-v1",
                  })
              targets.update({
                  "market": "#market",
                  "sample": '[aria-label="Crypto-Astro Public Sample Web Panel"]',
                  "scoring": "#scoring",
              })

              for mode, width, height in (
                  ("desktop", 1440, 1000),
                  ("mobile", 390, 844),
              ):
                  driver.set_window_size(width, height)
                  driver.refresh()
                  WebDriverWait(driver, 20).until(
                      lambda d: d.find_element(By.CSS_SELECTOR, ".score-orb.field-gauge").text.strip()
                  )
                  scroll_width = driver.execute_script("return document.documentElement.scrollWidth")
                  inner_width = driver.execute_script("return window.innerWidth")
                  overflow_ok = scroll_width <= inner_width + 1
                  checks[f"{mode}_horizontal_overflow"] = overflow_ok
                  report["viewports"][mode] = {
                      "requested": [width, height],
                      "inner_width": inner_width,
                      "scroll_width": scroll_width,
                      "screenshots": [],
                  }
                  for label, selector in targets.items():
                      element = driver.find_element(By.CSS_SELECTOR, selector)
                      target_y = driver.execute_script(
                          "document.documentElement.style.scrollBehavior='auto';"
                          "document.body.style.scrollBehavior='auto';"
                          "return arguments[0].getBoundingClientRect().top + window.scrollY;",
                          element,
                      )
                      driver.execute_script("window.scrollTo(0, arguments[0]);", max(0, target_y - 8))
                      time.sleep(0.35)
                      output = f"artifacts/{mode}-{label}.png"
                      driver.save_screenshot(output)
                      report["viewports"][mode]["screenshots"].append(output)

              severe = [
                  entry for entry in driver.get_log("browser")
                  if entry.get("level") == "SEVERE"
                  and "favicon" not in entry.get("message", "").lower()
              ]
              report["browser_severe"] = severe
              checks["browser_severe"] = not severe
              report["failures"] = [name for name, passed in checks.items() if not passed]
              assert not report["failures"], report["failures"]
          finally:
              driver.quit()
              Path("artifacts/visual-report.json").write_text(
                  json.dumps(report, ensure_ascii=False, indent=2) + "\n"
              )
          PY

      - name: Create visual contact sheets
        if: always()
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageDraw

          def sheet(mode, cell_width, cell_height, columns=2):
              candidate_labels = ("btc-hub", "aspect-cycle", "private-depth", "market", "sample", "scoring")
              labels = [
                  label for label in candidate_labels
                  if Path(f"artifacts/{mode}-{label}.png").exists()
              ]
              if not labels:
                  return
              rows = (len(labels) + columns - 1) // columns
              canvas = Image.new("RGB", (cell_width * columns, cell_height * rows), "#050914")
              draw = ImageDraw.Draw(canvas)
              for index, label in enumerate(labels):
                  path = Path(f"artifacts/{mode}-{label}.png")
                  image = Image.open(path).convert("RGB")
                  image.thumbnail((cell_width, cell_height - 28))
                  x = (index % columns) * cell_width
                  y = (index // columns) * cell_height
                  canvas.paste(image, (x, y + 28))
                  draw.text((x + 10, y + 8), f"{mode} · {label}", fill="#f7d47d")
              output = Path(f"artifacts/{mode}-contact-sheet.jpg")
              canvas.save(output, quality=72, optimize=True)

          sheet("desktop", 720, 520)
          sheet("mobile", 390, 872)
          PY

      - name: Upload visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-astro-pr-visual-${{ github.event.pull_request.number }}
          path: artifacts/
          if-no-files-found: error
