name: Crypto-Astro Static Refresh PR Visual

on:
  pull_request:
    paths:
      - 'site/crypto-astro/**'
      - 'site/theme/system.css'
      - 'site/theme/phi_theme.css'
      - 'site/theme/btc_poster_grade.css'
      - 'site/theme/btc_motion_budget.css'
      - 'site/theme/ip_semantic_seal.css'
      - 'site/theme/btc_phi_semantic_geometry.css'
      - 'site/theme/crypto_astro_what_changed.css'
      - 'tools/crypto_astro_static_refresh/**'
      - 'tools/crypto_astro_snapshot_memory/**'
      - 'tools/crypto_astro_what_changed/**'
      - '.github/workflows/crypto-astro-static-refresh-pr-visual.yml'
      - '.github/workflows/crypto-astro-static-refresh-manual.yml'

permissions:
  contents: read

jobs:
  visual:
    name: Validate static refresh and public surface
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install validators and browser
        run: |
          python -m pip install --disable-pip-version-check jsonschema==4.26.0 playwright==1.55.0
          python -m playwright install --with-deps chromium
      - name: Verify runner and methodology contracts
        run: |
          python -m py_compile \
            tools/crypto_astro_static_refresh/crypto_astro_static_refresh_hardened_v0_5.py \
            tools/crypto_astro_static_refresh/crypto_astro_all_module_static_refresh_source_v0_1.py
          python tools/crypto_astro_static_refresh/test_defi_tvl_methodology_v0_1.py
      - name: Verify dynamic memory and static rendering
        run: |
          mkdir -p artifacts
          python -m unittest discover -s tools/crypto_astro_snapshot_memory -p 'test_*.py' -v
          python tools/crypto_astro_snapshot_memory/verify_snapshot_memory.py --repo . --report artifacts/snapshot-memory.json
          python -m unittest discover -s tools/crypto_astro_what_changed -p 'test_*.py' -v
          cp site/crypto-astro/index.html /tmp/index-before.html
          python tools/crypto_astro_what_changed/render_what_changed.py --repo .
          cmp /tmp/index-before.html site/crypto-astro/index.html
          python tools/crypto_astro_what_changed/verify_what_changed.py --repo . --report artifacts/what-changed.json
      - name: Browser coherence review
        run: |
          python -m http.server 4173 --directory site > artifacts/http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:4173/crypto-astro/index.html >/dev/null && break
            sleep 0.5
          done
          curl --fail --silent http://127.0.0.1:4173/crypto-astro/index.html >/dev/null
          python - <<'PY'
          import json
          from pathlib import Path
          from playwright.sync_api import sync_playwright
          snapshot=json.loads(Path('site/crypto-astro/data/crypto_astro_snapshot.public.json').read_text())
          delta=json.loads(Path('site/crypto-astro/data/crypto_astro_snapshot_delta.public.json').read_text())
          system=Path('site/theme/system.css').read_text()
          geometry=Path('site/theme/btc_phi_semantic_geometry.css').read_text()
          poster="@import url('./btc_poster_grade.css');"
          motion="@import url('./btc_motion_budget.css');"
          seal="@import url('./ip_semantic_seal.css');"
          phi_geometry="@import url('./btc_phi_semantic_geometry.css');"
          assert system.index(poster) < system.index(motion) < system.index(seal) < system.index(phi_geometry)
          assert 'CRYPTO_ASTRO_BTC_PHI_SEMANTIC_GEOMETRY_v0_1' in geometry
          assert '--btc-phi-ratio: 1.61803398875' in geometry
          assert '--btc-phi-major: 61.803398875%' in geometry
          assert '--btc-phi-minor: 38.196601125%' in geometry
          assert 'counter-increment: btc-semantic-step' in geometry
          assert 'Φ' not in geometry
          assert '@keyframes' not in geometry
          assert 'animation:' not in geometry
          generated=snapshot['generated_at_utc']
          hero_timestamp=generated[:16].replace('T',' ')+' UTC'
          expected_status=delta['comparison_status'].lower().replace('_','-')
          dominance=f"{float(snapshot['market_reality']['btc_dominance_pct']):.1f}%"
          dominance_number=dominance.removesuffix('%')
          score=str(int(round(float(snapshot['field_output']['market_field_score']))))
          regime=str(snapshot['field_output']['regime_label'])
          out=Path('artifacts')
          report={}
          with sync_playwright() as p:
            browser=p.chromium.launch()
            for name,width,height in [('desktop',1440,1000),('mobile',390,844)]:
              page=browser.new_page(viewport={'width':width,'height':height})
              errors=[]; page.on('console',lambda msg: errors.append(msg.text) if msg.type=='error' else None)
              page.goto('http://127.0.0.1:4173/crypto-astro/index.html',wait_until='networkidle')
              section_status=page.locator('#what-changed').get_attribute('data-what-changed-status')
              metric_count=page.locator('#what-changed [data-metric]').count()
              hero_text=page.locator('.editorial-orientation-v0-1__trust').text_content() or ''
              btc_text=page.locator('#btc-phi-cycle-hub').text_content() or ''
              btc_aria=page.locator('.btc-field-v1').get_attribute('aria-label') or ''
              cta_count=page.locator('a[href="https://www.bhrigu.io/crypto-astro/btc"]').count()
              core=page.locator('.btc-quiet-phi-core-v0-3')
              core_text=core.text_content() or ''
              core_style=core.get_attribute('style')
              field=page.locator('.btc-field-v1')
              cycle=page.locator('.btc-cycle-canvas-v1')
              semantic_nodes=page.locator('.btc-node-v1')
              phi_geometry_state=page.evaluate("""() => {
                const field=document.querySelector('.btc-field-v1');
                const core=document.querySelector('.btc-quiet-phi-core-v0-3');
                const cycle=document.querySelector('.btc-cycle-canvas-v1');
                const route=document.querySelector('.btc-cycle-route-v1');
                const nodes=[...document.querySelectorAll('.btc-node-v1')];
                const fr=field.getBoundingClientRect();
                const cr=core.getBoundingClientRect();
                const yr=cycle.getBoundingClientRect();
                const nodeStyles=nodes.map(node => {
                  const style=getComputedStyle(node);
                  return {
                    gridColumnStart:style.gridColumnStart,
                    gridRowStart:style.gridRowStart,
                    position:style.position,
                  };
                });
                return {
                  fieldRatio:fr.width/fr.height,
                  coreX:(cr.left+cr.width/2-fr.left)/fr.width,
                  coreY:(cr.top+cr.height/2-fr.top)/fr.height,
                  cycleRatio:yr.width/yr.height,
                  cycleColumns:getComputedStyle(cycle).gridTemplateColumns,
                  cycleRows:getComputedStyle(cycle).gridTemplateRows,
                  membraneDisplay:getComputedStyle(cycle,'::before').display,
                  routeDisplay:getComputedStyle(route).display,
                  nodeStyles,
                };
              }""")
              barometer=page.locator('.barometer-core.barometer-semantic-core')
              barometer_text=barometer.text_content() or ''
              orb=barometer.locator('.score-orb.field-gauge')
              orb_text=(orb.text_content() or '').strip()
              orb_aria=orb.get_attribute('aria-label') or ''
              scroll_width=page.evaluate('document.documentElement.scrollWidth')
              client_width=page.evaluate('document.documentElement.clientWidth')
              evidence={
                'status':section_status,
                'expected_status':expected_status,
                'metric_count':metric_count,
                'expected_metric_count':len(delta['metrics']),
                'hero_timestamp_present':hero_timestamp in hero_text,
                'btc_timestamp_present':generated in btc_text,
                'btc_aria':btc_aria,
                'expected_btc_aria_fragment':f'BTC dominance is {dominance_number} percent',
                'cta_count':cta_count,
                'core_dominance_present':dominance in core_text,
                'core_style':core_style,
                'expected_core_style':f'--btc-dominance:{dominance};',
                'phi_geometry':phi_geometry_state,
                'semantic_node_count':semantic_nodes.count(),
                'barometer_score_present':f'Market Field Score: {score} / 100' in barometer_text,
                'barometer_regime_present':f'Observed state: {regime}' in barometer_text,
                'orb_text':orb_text,
                'orb_aria':orb_aria,
                'expected_orb_aria':f'Market Field Score {score} out of 100',
                'scroll_width':scroll_width,
                'client_width':client_width,
                'console_errors':errors,
              }
              report[name]=evidence
              page.screenshot(path=str(out/f'crypto-astro-{name}.png'),full_page=True)
              (out/f'crypto-astro-{name}-geometry.json').write_text(json.dumps(evidence,indent=2)+'\n')
              assert section_status==expected_status, evidence
              assert metric_count==len(delta['metrics']), evidence
              assert hero_timestamp in hero_text, evidence
              assert generated in btc_text, evidence
              assert f'BTC dominance is {dominance_number} percent' in btc_aria, evidence
              assert cta_count==2, evidence
              assert dominance in core_text, evidence
              assert core_style==f'--btc-dominance:{dominance};', evidence
              assert semantic_nodes.count()==5, evidence
              assert abs(phi_geometry_state['coreX']-0.61803398875) < 0.025, evidence
              assert abs(phi_geometry_state['coreY']-0.38196601125) < 0.025, evidence
              assert phi_geometry_state['routeDisplay']=='none', evidence
              assert phi_geometry_state['membraneDisplay']!='none', evidence
              if name=='desktop':
                assert abs(phi_geometry_state['fieldRatio']-1.61803398875) < 0.025, evidence
                assert abs(phi_geometry_state['cycleRatio']-1.61803398875) < 0.025, evidence
                assert [n['gridColumnStart'] for n in phi_geometry_state['nodeStyles']]==['2','1','3','1','3'], evidence
                assert [n['gridRowStart'] for n in phi_geometry_state['nodeStyles']]==['1','2','2','3','3'], evidence
              else:
                assert all(n['gridColumnStart']=='2' for n in phi_geometry_state['nodeStyles']), evidence
                assert all(n['position']=='relative' for n in phi_geometry_state['nodeStyles']), evidence
              assert f'Market Field Score: {score} / 100' in barometer_text, evidence
              assert f'Observed state: {regime}' in barometer_text, evidence
              assert orb_text==score, evidence
              assert orb_aria==f'Market Field Score {score} out of 100', evidence
              assert scroll_width <= client_width + 1, evidence
              assert not errors, evidence
              page.close()
            browser.close()
          (out/'browser-coherence.json').write_text(json.dumps(report,indent=2)+'\n')
          PY
      - name: Upload visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-astro-static-refresh-visual-${{ github.event.pull_request.number }}
          path: artifacts/
          if-no-files-found: error
