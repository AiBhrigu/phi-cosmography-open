name: Crypto-Astro Snapshot Memory v0.2 Transport

on:
  pull_request:
    types: [synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/crypto-astro-snapshot-memory-pr.yml'
      - 'tools/crypto_astro_snapshot_memory/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  transport:
    if: >-
      github.event.pull_request.number == 138 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/crypto-astro-refresh-snapshot-memory-v02' &&
      contains(github.event.pull_request.body, 'REFRESH_MEMORY_V02_TRANSPORT=AUTHORIZED')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@v5
        with:
          ref: agent/crypto-astro-refresh-snapshot-memory-v02
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify and expand exact payload
        run: |
          set -euo pipefail
          PART_GLOB='tools/crypto_astro_snapshot_memory/.refresh_memory_v02_payload.part-*'
          compgen -G "$PART_GLOB" >/dev/null
          cat $PART_GLOB > /tmp/refresh-memory-v02.b64
          test "$(sha256sum /tmp/refresh-memory-v02.b64 | awk '{print $1}')" = '5e57b71fa79489de526d6ee7b0d0addbf2e2cf8977abc6794f5830698478920b'
          base64 -d /tmp/refresh-memory-v02.b64 > /tmp/refresh-memory-v02.tar.gz
          test "$(sha256sum /tmp/refresh-memory-v02.tar.gz | awk '{print $1}')" = '9298152f0ad8c3632671a8513264bf44ba3ec2df2d94ecb9989a31aba8440ede'
          tar -xzf /tmp/refresh-memory-v02.tar.gz -C .
          rm $PART_GLOB
          python - <<'PY'
          from pathlib import Path
          path = Path('site/crypto-astro/data/crypto_astro_snapshot_registry.public.json')
          text = path.read_text(encoding='utf-8')
          repairs = (
              ('2754dc348605a2655e26dbc0494d63510ca88843', '2a37742fc4d962be4bcbc7e8d925834102de5030', 9),
              ('086a77f2dd209a061e6b557de0e86a9b7b4f98d9', '136f78c1df53e67b0765794eb02589cae5e11349', 9),
          )
          for old, new, expected in repairs:
              assert text.count(old) == expected, (old, text.count(old))
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Enforce exact final implementation scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python - <<'PY'
          import os, subprocess
          expected = {
            '.github/workflows/crypto-astro-static-refresh-manual.yml',
            '.github/workflows/crypto-astro-static-refresh-pr-visual.yml',
            '.github/workflows/crypto-astro-snapshot-memory-pr.yml',
            '.github/workflows/crypto-astro-what-changed-pr.yml',
            'tools/crypto_astro_snapshot_memory/build_snapshot_memory.py',
            'tools/crypto_astro_snapshot_memory/verify_snapshot_memory.py',
            'tools/crypto_astro_snapshot_memory/test_snapshot_memory.py',
            'site/crypto-astro/data/crypto_astro_snapshot_registry.public.schema.json',
            'site/crypto-astro/data/crypto_astro_snapshot_delta.public.schema.json',
            'site/crypto-astro/data/crypto_astro_snapshot_registry.public.json',
            'site/crypto-astro/data/crypto_astro_snapshot_delta.public.json',
            'tools/crypto_astro_what_changed/render_what_changed.py',
            'tools/crypto_astro_what_changed/verify_what_changed.py',
            'tools/crypto_astro_what_changed/test_what_changed.py',
          }
          changed=set(subprocess.check_output(['git','diff','--name-only',os.environ['BASE_SHA']],text=True).splitlines())
          assert changed == expected, {'missing':sorted(expected-changed),'unexpected':sorted(changed-expected)}
          PY

      - name: Install schema validator
        run: python -m pip install --disable-pip-version-check jsonschema==4.26.0

      - name: Compile implementation tools
        run: python -m py_compile tools/crypto_astro_snapshot_memory/build_snapshot_memory.py tools/crypto_astro_snapshot_memory/verify_snapshot_memory.py tools/crypto_astro_what_changed/render_what_changed.py tools/crypto_astro_what_changed/verify_what_changed.py

      - name: Run Snapshot Memory fixtures
        run: python -m unittest discover -s tools/crypto_astro_snapshot_memory -p 'test_*.py' -v

      - name: Run What Changed fixtures
        run: python -m unittest discover -s tools/crypto_astro_what_changed -p 'test_*.py' -v

      - name: Build committed accepted pair
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          rm -rf /tmp/memory-build
          python tools/crypto_astro_snapshot_memory/build_snapshot_memory.py --repo . --out-dir /tmp/memory-build > /tmp/build.log 2>&1
          code=$?
          cat /tmp/build.log
          if [ "$code" -ne 0 ]; then
            {
              echo '<!-- REFRESH_MEMORY_V02_BUILD_FAILURE -->'
              echo '```text'
              tail -n 80 /tmp/build.log
              echo '```'
            } > /tmp/build-comment.md
            gh pr comment 138 --body-file /tmp/build-comment.md
            exit "$code"
          fi

      - name: Compare committed registry
        run: cmp site/crypto-astro/data/crypto_astro_snapshot_registry.public.json /tmp/memory-build/site/crypto-astro/data/crypto_astro_snapshot_registry.public.json

      - name: Compare committed delta
        run: cmp site/crypto-astro/data/crypto_astro_snapshot_delta.public.json /tmp/memory-build/site/crypto-astro/data/crypto_astro_snapshot_delta.public.json

      - name: Verify Snapshot Memory contract
        run: python tools/crypto_astro_snapshot_memory/verify_snapshot_memory.py --repo .

      - name: Prove static render is byte-identical
        run: |
          cp site/crypto-astro/index.html /tmp/index-before.html
          python tools/crypto_astro_what_changed/render_what_changed.py --repo .
          cmp /tmp/index-before.html site/crypto-astro/index.html

      - name: Verify What Changed binding
        run: python tools/crypto_astro_what_changed/verify_what_changed.py --repo .

      - name: Commit final implementation to PR branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Crypto-Astro: bind dynamic snapshot memory to refresh pipeline'
          git push origin HEAD:agent/crypto-astro-refresh-snapshot-memory-v02
